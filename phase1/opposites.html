<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Opposites · Phase 1 · Simply Everything</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',Courier,monospace;touch-action:none;}

#bg{position:fixed;inset:0;width:100%;height:100%;opacity:0;transition:opacity 1.6s ease;z-index:0;pointer-events:none;}
#bg.on{opacity:.58;}

#nav{position:fixed;top:0;left:0;right:0;height:44px;display:flex;background:rgba(0,0,0,.82);border-bottom:1px solid rgba(255,255,255,.05);z-index:100;opacity:0;transition:opacity .6s ease;}
#nav.on{opacity:1;}
.tbtn{flex:1;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-bottom:2px solid transparent;transition:border-color .18s;}
.tbtn.active{border-bottom-color:rgba(255,255,255,.45);}
.btier{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.26);text-transform:uppercase;pointer-events:none;}
.bname{font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,.40);text-transform:uppercase;pointer-events:none;}
.tbtn.active .btier{color:rgba(255,255,255,.44);}
.tbtn.active .bname{color:rgba(255,255,255,.90);}

.tier{position:fixed;top:44px;left:0;right:0;bottom:0;z-index:10;display:none;flex-direction:column;align-items:center;}
.tier.on{display:flex;}

/* ── TIER I ── */
#t1{justify-content:flex-start;position:relative;}
#t1-scroll{width:100%;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;justify-content:center;padding:10px 0 36px;touch-action:pan-y;}
#t1-grid{display:grid;gap:8px;padding:0 10px;}
.tile{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:3px 0;opacity:0;transform:scale(.72) translateY(8px);transition:opacity .5s ease,transform .5s ease;}
.tile.on{opacity:1;transform:scale(1) translateY(0);}
.tile-cv{display:block;border-radius:4px;}
.tile-lbl{font-size:6px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.20);margin-top:4px;filter:blur(.7px);user-select:none;}
#t1-hint{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.22);position:absolute;bottom:14px;left:0;right:0;text-align:center;z-index:2;opacity:0;transition:opacity .7s ease .3s;pointer-events:none;}
#t1-hint.on{opacity:1;}

/* ── TIER II ── */
#t2{justify-content:space-between;padding:10px 16px 22px;}
#t2-top{align-self:stretch;text-align:center;padding-top:2px;}
#t2-label{font-size:7px;letter-spacing:2.5px;color:rgba(255,255,255,.18);text-transform:uppercase;margin-bottom:3px;}
#t2-name{display:block;font-size:12px;letter-spacing:3.5px;color:rgba(255,255,255,.55);text-transform:uppercase;}
#t2-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;width:100%;}
#t2-nav-row{display:flex;align-items:center;gap:16px;}
.navbtn{background:transparent;border:1px solid rgba(255,255,255,.10);cursor:pointer;padding:7px 14px;color:rgba(255,255,255,.55);font-size:14px;font-family:'Courier New',Courier,monospace;transition:border-color .15s;}
.navbtn:hover{border-color:rgba(255,255,255,.30);}
#t2-pat-counter{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.28);min-width:48px;text-align:center;}
#t2-shape-wrap{display:flex;align-items:center;justify-content:center;}
#t2-cv{display:block;cursor:pointer;}
#t2-state-word{font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.65);text-transform:uppercase;text-align:center;min-height:20px;transition:opacity .25s ease;}
#t2-touch{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.42);user-select:none;pointer-events:none;}

/* ── TIER IV ── */
#t4{overflow:hidden;padding:0;}
#t4-cv{position:absolute;inset:0;display:block;cursor:crosshair;}
#t4-ui{position:absolute;bottom:20px;left:0;right:0;display:flex;flex-direction:column;align-items:center;pointer-events:none;z-index:20;}
#t4-touch{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.18);user-select:none;transition:opacity .6s ease;}
</style>
</head>
<body>

<canvas id="bg" aria-hidden="true"></canvas>

<nav id="nav">
  <button class="tbtn active" data-tier="1"><div class="btier">TIER I</div><div class="bname">LEARN</div></button>
  <button class="tbtn" data-tier="2"><div class="btier">TIER II</div><div class="bname">EXPLORE</div></button>
  <button class="tbtn" data-tier="4"><div class="btier">TIER IV</div><div class="bname">PLAY</div></button>
</nav>

<div id="t1" class="tier on">
  <div id="t1-scroll"><div id="t1-grid"></div></div>
  <div id="t1-hint">TOUCH A PAIR</div>
</div>

<div id="t2" class="tier">
  <div id="t2-top">
    <div id="t2-label">OPPOSITES</div>
    <span id="t2-name">BIG &middot; SMALL</span>
  </div>
  <div id="t2-mid">
    <div id="t2-nav-row">
      <button class="navbtn" id="t2-prev">&#9664;</button>
      <span id="t2-pat-counter">1 / 12</span>
      <button class="navbtn" id="t2-next">&#9654;</button>
    </div>
    <div id="t2-shape-wrap"><canvas id="t2-cv"></canvas></div>
    <div id="t2-state-word">BIG</div>
  </div>
  <div id="t2-touch">TOUCH TO EXPLORE</div>
</div>

<div id="t4" class="tier">
  <canvas id="t4-cv"></canvas>
  <div id="t4-ui"><div id="t4-touch">TOUCH ANYWHERE</div></div>
</div>

<script>
'use strict';

/* ====================================================================
   PULSETOCK — Simply Everything · Stage 7
   Verbatim from Patterns-SandboxV1.html + onTick callback support
   ==================================================================== */
const PulseTock=(function(){
  let actx=null,hbSched=0,hbInt=1.12,nextTick=0,lastBeatJS=0,started=false;
  let stage=1,hbVol=1.0,tickVol=0.04,duckCur=1.0,duckTgt=1.0,duckRaf=null;
  const cbs=[],tickCbs=[];let _vp=0,rafOn=false;
  const MIX=[null,{hb:1.00,t:0.04},{hb:0.90,t:0.10},{hb:0.75,t:0.22},
    {hb:0.62,t:0.32},{hb:0.52,t:0.42},{hb:0.42,t:0.52},{hb:0.32,t:0.64},
    {hb:0.22,t:0.76},{hb:0.12,t:0.88},{hb:0.05,t:1.00}];
  function mix(){const m=MIX[stage]||MIX[1];hbVol=m.hb;tickVol=m.t;}
  function ac(){
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended')actx.resume();return actx;
  }
  function thud(t,f,v,d){
    try{
      const x=ac(),vol=v*hbVol*duckCur;if(vol<.001)return;
      const o=x.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*.48,t+d);
      const nL=Math.floor(x.sampleRate*(d+.06));
      const nb=x.createBuffer(1,nL,x.sampleRate);const nd=nb.getChannelData(0);
      for(let i=0;i<nL;i++)nd[i]=(Math.random()*2-1)*Math.exp(-i/(x.sampleRate*.032));
      const ns=x.createBufferSource();ns.buffer=nb;
      const lp1=x.createBiquadFilter();lp1.type='lowpass';lp1.frequency.value=90;
      const lp2=x.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=130;
      const og=x.createGain();og.gain.value=.58;
      const ng=x.createGain();ng.gain.value=.42;
      const env=x.createGain();
      env.gain.setValueAtTime(0,t);env.gain.linearRampToValueAtTime(vol,t+.013);
      env.gain.exponentialRampToValueAtTime(.001,t+d*2.4);
      o.connect(og);og.connect(lp1);ns.connect(ng);ng.connect(lp1);
      lp1.connect(lp2);lp2.connect(env);env.connect(x.destination);
      o.start(t);o.stop(t+d*3);ns.start(t);
    }catch(e){}
  }
  function hb(t){thud(t,62,.68,.13);thud(t+.20,76,.42,.10);}
  function tick(t){
    try{
      const x=ac(),v=tickVol*duckCur;if(v<.001)return;
      const nL=Math.floor(x.sampleRate*.013);
      const buf=x.createBuffer(1,nL,x.sampleRate);const d=buf.getChannelData(0);
      for(let i=0;i<nL;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(x.sampleRate*.005));
      const s=x.createBufferSource();s.buffer=buf;
      const bp=x.createBiquadFilter();bp.type='bandpass';bp.frequency.value=420;bp.Q.value=3.2;
      const g=x.createGain();g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
      s.connect(bp);bp.connect(g);g.connect(x.destination);s.start(t);
    }catch(e){}
  }
  function ambient(){
    try{
      const x=ac();
      const buf=x.createBuffer(2,x.sampleRate*4,x.sampleRate);
      for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;}
      const s=x.createBufferSource();s.buffer=buf;s.loop=true;
      const l1=x.createBiquadFilter();l1.type='lowpass';l1.frequency.value=70;
      const l2=x.createBiquadFilter();l2.type='lowpass';l2.frequency.value=45;
      const g=x.createGain();g.gain.value=.022;
      s.connect(l1);l1.connect(l2);l2.connect(g);g.connect(x.destination);s.start();
    }catch(e){}
  }
  function sched(){
    const x=ac();
    while(hbSched<x.currentTime+.22){
      hb(hbSched);
      const delay=Math.max(0,(hbSched-x.currentTime)*1000);
      setTimeout(()=>{lastBeatJS=Date.now();cbs.forEach(fn=>{try{fn();}catch(e){}});},delay);
      hbInt=1.03+Math.random()*.19;hbSched+=hbInt;
    }
    while(nextTick<x.currentTime+.22){
      tick(nextTick);
      const td=Math.max(0,(nextTick-x.currentTime)*1000);
      setTimeout(()=>{tickCbs.forEach(fn=>{try{fn();}catch(e){}});},td);
      nextTick+=1.0;
    }
  }
  function rampDuck(){
    const d=duckTgt-duckCur;if(Math.abs(d)<.002){duckCur=duckTgt;duckRaf=null;return;}
    duckCur+=d*.04*3.5;duckRaf=requestAnimationFrame(rampDuck);
  }
  function setDuck(t){duckTgt=Math.max(.05,Math.min(1,t));if(!duckRaf)duckRaf=requestAnimationFrame(rampDuck);}
  function pulseLoop(){
    const s=(Date.now()-lastBeatJS)/1000;
    const lub=Math.max(0,1-s*11);
    const dub=s>.16?Math.max(0,1-(s-.20)*13)*.7:0;
    _vp=Math.max(lub,dub);requestAnimationFrame(pulseLoop);
  }
  return{
    start(){
      if(started){const x=ac();if(x.state==='suspended')x.resume();return;}
      started=true;mix();const x=ac();
      hbSched=x.currentTime+.35;nextTick=x.currentTime+.50;
      ambient();sched();setInterval(sched,110);
      if(!rafOn){rafOn=true;requestAnimationFrame(pulseLoop);}
    },
    setStage(s){stage=Math.max(1,Math.min(10,Math.round(s)));mix();},
    duck(t=.18){setDuck(t);},restore(){setDuck(1);},
    onBeat(fn){if(typeof fn==='function')cbs.push(fn);},
    onTick(fn){if(typeof fn==='function')tickCbs.push(fn);},
    get vPulse(){return _vp;},get stage(){return stage;}
  };
})();

/* ====================================================================
   SCENE — verbatim from Patterns-SandboxV1.html
   ==================================================================== */
const Scene=(()=>{
  let cv,ctx,W,H,HZ,t0=null;
  let stars=[],rT=[],lT=[],rTx=[],lLn=[],fgB={l1:[],l2:[],r1:[],r2:[]},tufts=[];
  let MTN={};
  const C={sk0:'#020610',sk1:'#060e18',sk2:'#0a1420',gd0:'#0a1008',gd1:'#050704',
    hg:'rgba(28,52,22,.20)',mf:'#111e11',mn:'#192b19',ft:'#223022',ftd:'#1a261a',
    fb:'rgba(42,62,36,.90)',fbd:'rgba(32,48,28,.78)',mnl:'rgba(30,50,26,.88)',
    mfm:'rgba(20,34,18,.88)',tr:'#182018',trd:'#121a12',gr:'#1c2812',grh:'#243014'};
  function bz(t,p0,p1,p2,p3){const u=1-t;return u*u*u*p0+3*u*u*t*p1+3*u*t*t*p2+t*t*t*p3;}
  function mY(px,py,bl,br,x,hz){
    const il=x<=px;let x0,x1,x2,x3,y0,y1,y2,y3;
    if(il){x0=bl;y0=hz;const mL=bl+(px-bl)*.42;x1=mL;y1=hz-(hz-py)*.65;x2=mL+(px-mL)*.6;y2=py+6;x3=px;y3=py;}
    else{x0=px;y0=py;const mR=px+(br-px)*.58;x1=mR;y1=py+6;x2=mR+(br-mR)*.4;y2=hz-(hz-py)*.65;x3=br;y3=hz;}
    let lo=0,hi=1;for(let i=0;i<18;i++){const m=(lo+hi)*.5;bz(m,x0,x1,x2,x3)<x?lo=m:hi=m;}
    return bz((lo+hi)*.5,y0,y1,y2,y3);
  }
  function build(w,h,hz){
    MTN={r:{px:w*.76,py:h*.30,bl:w*.42,br:w*1.04},l:{px:w*.26,py:h*.24,bl:w*-.06,br:w*.58}};
    stars=[];for(let i=0;i<Math.floor(w*h/1900);i++)stars.push({x:Math.random()*w,y:Math.random()*hz*.9,r:Math.random()*.85+.18,b:Math.random()*.24+.04,p:Math.random()*Math.PI*2,s:.22+Math.random()*.42});
    rT=[];const rm=MTN.r;
    for(let i=0;i<200;i++){const tx=rm.bl+Math.random()*(rm.br-rm.bl);if(tx>w*1.01)continue;const sy=mY(rm.px,rm.py,rm.bl,rm.br,tx,hz);if(sy>=hz-h*.004)continue;rT.push({x:tx,y:sy,h:h*(.016+Math.random()*.016),w:h*(.005+Math.random()*.006)});}
    rTx=[];for(let i=0;i<260;i++){const tx=rm.bl+Math.random()*(rm.br-rm.bl);if(tx>w*1.01)continue;const sy=mY(rm.px,rm.py,rm.bl,rm.br,tx,hz);const ty=sy+Math.random()*(hz-sy)*.8;if(ty>=hz)continue;rTx.push({tx,ty,dot:Math.random()<.5,len:Math.random()*3.2+1.2,ang:(Math.random()-.5)*.9,a:.15+Math.random()*.19});}
    lT=[];const lm=MTN.l;
    for(let i=0;i<180;i++){const tx=lm.bl+Math.random()*(lm.br-lm.bl);const sy=mY(lm.px,lm.py,lm.bl,lm.br,tx,hz);if(sy>=hz-h*.004)continue;lT.push({x:tx,y:sy,h:h*(.022+Math.random()*.020),w:h*(.007+Math.random()*.008)});}
    lLn=[];for(let i=0;i<180;i++){const tx=lm.bl+Math.random()*(lm.br-lm.bl);const sy=mY(lm.px,lm.py,lm.bl,lm.br,tx,hz);const ty=sy+Math.random()*(hz-sy)*.85;if(ty>=hz)continue;lLn.push({tx,ty,len:h*(.016+Math.random()*.024),ang:-Math.PI*.30+(Math.random()-.5)*.45,a:.18+Math.random()*.26});}
    function mkB(cx,height,spread){
      const L=[];for(let t=0;t<4;t++){const fr=t/4,tT=hz-height*(.95-fr*.76),tB=hz-height*(.60-fr*.74)+height*.08,mid=(tT+tB)/2,tW=spread*(.28+fr*.72+.04),cnt=5+Math.floor(fr*9);
        for(let b=0;b<cnt;b++){const bf=b/cnt;L.push({x:cx-tW*.44+bf*tW*.88+(Math.random()-.5)*tW*.10,y:mid+(Math.random()-.5)*(tB-tT)*.72,len:h*(.011+Math.random()*.016),ang:-Math.PI*.20+(Math.random()-.5)*.5,a:.24+Math.random()*.32});}}return L;}
    fgB.l1=mkB(w*.09,h*.68,w*.130);fgB.l2=mkB(w*.20,h*.56,w*.118);
    fgB.r1=mkB(w*.83,h*.45,w*.086);fgB.r2=mkB(w*.93,h*.52,w*.098);
    tufts=[];for(let i=0;i<38;i++)tufts.push({x:w*(.12+Math.random()*.76),y:hz+h*(.06+Math.random()*.18),h:h*(.008+Math.random()*.009),sw:(Math.random()-.5)*.26,p:Math.random()*Math.PI*2});
  }
  function fillM(m,col,hz){
    const{px,py,bl,br}=m;ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(bl,hz);
    const mL=bl+(px-bl)*.42,mR=px+(br-px)*.58;
    ctx.bezierCurveTo(mL,hz-(hz-py)*.65,mL+(px-mL)*.6,py+6,px,py);
    ctx.bezierCurveTo(mR,py+6,mR+(br-mR)*.4,hz-(hz-py)*.65,br,hz);
    ctx.lineTo(br,hz);ctx.lineTo(bl,hz);ctx.closePath();ctx.fill();
  }
  function hTree(x,y,th,tw,col){
    ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(x,y-th);ctx.lineTo(x+tw*.36,y-th*.36);ctx.lineTo(x-tw*.36,y-th*.36);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(x,y-th*.58);ctx.lineTo(x+tw*.50,y);ctx.lineTo(x-tw*.50,y);ctx.closePath();ctx.fill();
  }
  function fgTree(cx,ht,sp,col,tCol){
    const by=HZ-3;
    for(let t=0;t<4;t++){const f=t/4,tT=by-ht*(.95-f*.76),tB=by-ht*(.60-f*.74)+ht*.08,tW=sp*(.28+f*.72+.04);ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(cx,tT);ctx.lineTo(cx+tW/2,tB);ctx.lineTo(cx-tW/2,tB);ctx.closePath();ctx.fill();}
    const tw=Math.max(4,sp*.08),tTop=by-ht*.11;ctx.fillStyle=tCol;ctx.fillRect(cx-tw/2,tTop,tw,(HZ+4)-tTop);
  }
  function brLines(marks,col){
    ctx.save();ctx.strokeStyle=col;ctx.lineCap='round';ctx.lineWidth=1.3;
    marks.forEach(m=>{ctx.globalAlpha=m.a;ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(m.x+Math.cos(m.ang)*m.len,m.y+Math.sin(m.ang)*m.len);ctx.stroke();});
    ctx.restore();
  }
  function stream(t){
    const sx=W*.03,sy=H*.80,ex=W*.26,ey=HZ+H*.018,c1x=W*.07,c1y=H*.84,c2x=W*.16,c2y=H*.72;
    ctx.save();const sg=ctx.createLinearGradient(sx,sy,ex,ey);
    sg.addColorStop(0,'rgba(8,18,30,0)');sg.addColorStop(.3,'rgba(14,30,48,.48)');sg.addColorStop(.72,'rgba(16,32,52,.38)');sg.addColorStop(1,'rgba(10,20,36,0)');
    ctx.strokeStyle=sg;ctx.lineWidth=W*.022;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(sx,sy);ctx.bezierCurveTo(c1x,c1y,c2x,c2y,ex,ey);ctx.stroke();
    const shi=(Math.sin(t*1.3)*.5+.5)*.09+.04;ctx.strokeStyle='rgba(50,100,140,'+shi+')';ctx.lineWidth=W*.005;
    ctx.beginPath();ctx.moveTo(sx+W*.01,sy+H*.004);ctx.bezierCurveTo(c1x+W*.01,c1y,c2x,c2y,ex,ey);ctx.stroke();ctx.restore();
  }
  function stageEl(w,h){
    const sw=Math.min(w*.26,210),sh=h*.016,sx=w*.5-sw/2,sy=h-h*.034-sh;
    ctx.save();ctx.fillStyle=C.trd;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(sx,sy,sw,sh,2);else ctx.rect(sx,sy,sw,sh);ctx.fill();
    ctx.fillStyle='rgba(80,70,48,.13)';ctx.fillRect(sx+2,sy,sw-4,1.5);ctx.restore();
  }
  return{
    init(canvas){cv=canvas;ctx=cv.getContext('2d');},
    resize(w,h){
      W=w;H=h;const asp=W/H,tt=Math.max(0,Math.min(1,(asp-.6)/.8));
      HZ=H*(.70+tt*.04);const dp=window.devicePixelRatio||1;
      cv.width=Math.round(W*dp);cv.height=Math.round(H*dp);cv.style.width=W+'px';cv.style.height=H+'px';
      ctx.setTransform(1,0,0,1,0,0);ctx.scale(dp,dp);build(W,H,HZ);
    },
    draw(ts){
      if(!t0)t0=ts;const t=(ts-t0)/1000;
      ctx.clearRect(0,0,W,H);
      const sky=ctx.createLinearGradient(0,0,0,HZ);sky.addColorStop(0,C.sk0);sky.addColorStop(.55,C.sk1);sky.addColorStop(1,C.sk2);ctx.fillStyle=sky;ctx.fillRect(0,0,W,HZ+H*.05);
      const gnd=ctx.createLinearGradient(0,HZ,0,H);gnd.addColorStop(0,C.gd0);gnd.addColorStop(.55,'#070d05');gnd.addColorStop(1,C.gd1);ctx.fillStyle=gnd;ctx.fillRect(0,HZ,W,H-HZ);
      const hgrd=ctx.createLinearGradient(0,HZ-H*.07,0,HZ+H*.05);hgrd.addColorStop(0,'rgba(0,0,0,0)');hgrd.addColorStop(.5,C.hg);hgrd.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=hgrd;ctx.fillRect(0,HZ-H*.07,W,H*.12);
      stars.forEach(s=>{const tw=s.b+(Math.sin(t*s.s+s.p)*.5+.5)*.10;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(215,220,255,'+tw+')';ctx.fill();});
      fillM(MTN.r,C.mf,HZ);rT.forEach(tr=>hTree(tr.x,tr.y,tr.h,tr.w,C.mf));

/* ====================================================================
   12 OPPOSITE PAIRS — draw(ctx, state, cx, cy, r)

/* 1. BIG · SMALL */
function drawBigSmall(ctx,state,cx,cy,r){
  const sz=state===0?r*.90:r*.30;
  ctx.save();ctx.shadowColor='#FF4444';ctx.shadowBlur=sz*.5;
  ctx.fillStyle='#FF4444';ctx.beginPath();ctx.arc(cx,cy,sz,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

/* 2. HOT · COLD */
function drawHotCold(ctx,state,cx,cy,r){
  if(state===0){
    ctx.save();
    ctx.fillStyle='#FF6600';
    ctx.beginPath();
    ctx.moveTo(cx,cy-r*.92);
    ctx.bezierCurveTo(cx+r*.46,cy-r*.36,cx+r*.56,cy+r*.20,cx,cy+r*.52);
    ctx.bezierCurveTo(cx-r*.56,cy+r*.20,cx-r*.46,cy-r*.36,cx,cy-r*.92);
    ctx.fill();
    ctx.fillStyle='#FFD700';
    ctx.beginPath();
    ctx.moveTo(cx,cy-r*.50);
    ctx.bezierCurveTo(cx+r*.24,cy-r*.14,cx+r*.28,cy+r*.22,cx,cy+r*.38);
    ctx.bezierCurveTo(cx-r*.28,cy+r*.22,cx-r*.24,cy-r*.14,cx,cy-r*.50);
    ctx.fill();
    ctx.restore();
  }else{
    ctx.save();
    ctx.strokeStyle='#66BBFF';ctx.lineWidth=Math.max(1.5,r*.10);ctx.lineCap='round';
    for(let i=0;i<6;i++){
      const a=(i*Math.PI)/3;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r*.86,cy+Math.sin(a)*r*.86);ctx.stroke();
      const bx=cx+Math.cos(a)*r*.52,by=cy+Math.sin(a)*r*.52,bl=r*.26;
      ctx.beginPath();
      ctx.moveTo(bx+Math.cos(a+Math.PI/3)*bl,by+Math.sin(a+Math.PI/3)*bl);
      ctx.lineTo(bx,by);
      ctx.lineTo(bx+Math.cos(a-Math.PI/3)*bl,by+Math.sin(a-Math.PI/3)*bl);
      ctx.stroke();
    }
    ctx.fillStyle='#66BBFF';ctx.beginPath();ctx.arc(cx,cy,r*.10,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

/* 3. TALL · SHORT (flowers) */
function drawTallShort(ctx,state,cx,cy,r){
  ctx.save();

    const sTop=cy-r*.86,sBot=cy+r*.90;
    ctx.fillStyle='#5D8A3C';ctx.fillRect(cx-stemW/2,sTop,stemW,sBot-sTop);
    ctx.fillStyle='#76A84E';
    ctx.beginPath();ctx.ellipse(cx+r*.24,sTop+(sBot-sTop)*.48,r*.22,r*.10,.45,0,Math.PI*2);ctx.fill();
    const hr=r*.30;
    for(let i=0;i<8;i++){
      const a=(i*Math.PI)/4;
      ctx.fillStyle='#FFD700';
      ctx.beginPath();ctx.ellipse(cx+Math.cos(a)*hr*.86,sTop+Math.sin(a)*hr*.86,hr*.36,hr*.17,a,0,Math.PI*2);ctx.fill();

    }
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(cx,sTop,hr*.38,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

/* 6. UP · DOWN */

    ctx.beginPath();ctx.moveTo(cx-topW/2+r*.06,gY+gH*.15);ctx.lineTo(cx+topW/2-r*.06,gY+gH*.15);ctx.stroke();
    ctx.restore();
  }
  ctx.strokeStyle=state===0?'rgba(160,210,255,.82)':'rgba(100,180,255,.55)';
  ctx.lineWidth=Math.max(1.5,r*.09);ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(cx-topW/2,gY);ctx.lineTo(cx+topW/2,gY);
  ctx.lineTo(cx+botW/2,gY+gH);ctx.lineTo(cx-botW/2,gY+gH);
  ctx.closePath();ctx.stroke();
  ctx.restore();
}

/* 12. ROUGH · SMOOTH */
function drawRoughSmooth(ctx,state,cx,cy,r){
  ctx.save();
  if(state===0){
    ctx.strokeStyle='rgba(170,130,80,.22)';ctx.lineWidth=Math.max(.8,r*.05);ctx.lineCap='round';
    for(let i=0;i<18;i++){
      const hx=cx+(Math.sin(i*1.7)*.80)*r,hy=cy+(Math.cos(i*2.3)*.76)*r;
      const ha=Math.sin(i*3.1)*Math.PI,hl=r*(.14+Math.sin(i*.9)*.08);
      ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx+Math.cos(ha)*hl,hy+Math.sin(ha)*hl);ctx.stroke();
    }
    ctx.strokeStyle='#CC8844';ctx.lineWidth=Math.max(2,r*.12);ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(cx-r*.84,cy);
    for(let i=1;i<=10;i++){
      const px=cx-r*.84+(i/10)*r*1.68;
      const py=cy+(i%2===0?-1:1)*r*(.28+Math.sin(i*.9)*.10);
      ctx.lineTo(px,py);
    }
    ctx.stroke();
  }else{
    const sg=ctx.createLinearGradient(cx-r,cy-r*.6,cx+r,cy+r*.6);
    sg.addColorStop(0,'rgba(70,110,150,.14)');sg.addColorStop(1,'rgba(50,90,130,.08)');
    ctx.fillStyle=sg;ctx.fillRect(cx-r*.90,cy-r*.65,r*1.80,r*1.30);
    ctx.strokeStyle='#88BBDD';ctx.lineWidth=Math.max(2,r*.12);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx-r*.84,cy);ctx.lineTo(cx+r*.84,cy);ctx.stroke();
  }
  ctx.restore();
}

/* ====================================================================
   PAIRS CONFIG
   drawT2 overrides the drawing for Tier II only (On/Off uses switch)
   ==================================================================== */
const PAIRS=[
  {label:'BIG \u00B7 SMALL',  left:'BIG',    right:'SMALL',  draw:drawBigSmall},
  {label:'HOT \u00B7 COLD',   left:'HOT',    right:'COLD',   draw:drawHotCold},
  {label:'TALL \u00B7 SHORT', left:'TALL',   right:'SHORT',  draw:drawTallShort},
  {label:'FAST \u00B7 SLOW',  left:'FAST',   right:'SLOW',   draw:drawFastSlow},
  {label:'HAPPY \u00B7 SAD',  left:'HAPPY',  right:'SAD',    draw:drawHappySad},
  {label:'UP \u00B7 DOWN',    left:'UP',     right:'DOWN',   draw:drawUpDown},
  {label:'ON \u00B7 OFF',     left:'ON',     right:'OFF',    draw:drawOnOff,   drawT2:drawOnOffSwitch},
  {label:'IN \u00B7 OUT',     left:'IN',     right:'OUT',    draw:drawInOut},
  {label:'OPEN \u00B7 CLOSED',left:'OPEN',   right:'CLOSED', draw:drawOpenClosed},
  {label:'DAY \u00B7 NIGHT',  left:'DAY',    right:'NIGHT',  draw:drawDayNight},
  {label:'EMPTY \u00B7 FULL', left:'EMPTY',  right:'FULL',   draw:drawEmptyFull},
  {label:'ROUGH \u00B7 SMOOTH',left:'ROUGH', right:'SMOOTH', draw:drawRoughSmooth},
];

/* ====================================================================
   AUDIO — stream + birds + toggle click + flip whoosh
   ==================================================================== */
let _sac=null;
function getSAC(){
  if(!_sac)_sac=new(window.AudioContext||window.webkitAudioContext)();
  if(_sac.state==='suspended')_sac.resume();return _sac;
}
let _ambStarted=false;
function startAmbient(){
  if(_ambStarted)return;_ambStarted=true;
  try{
    const ac=getSAC();
    const len=ac.sampleRate*4,buf=ac.createBuffer(1,len,ac.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
    const src=ac.createBufferSource();src.buffer=buf;src.loop=true;
    const lp1=ac.createBiquadFilter();lp1.type='lowpass';lp1.frequency.value=800;
    const lp2=ac.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=500;
    const hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=150;
    const lfo=ac.createOscillator();lfo.frequency.value=.10;
    const lfog=ac.createGain();lfog.gain.value=220;lfo.connect(lfog);lfog.connect(lp1.frequency);lfo.start();
    const g=ac.createGain();g.gain.setValueAtTime(0,ac.currentTime);g.gain.linearRampToValueAtTime(.065,ac.currentTime+2.2);
    src.connect(lp1);lp1.connect(lp2);lp2.connect(hp);hp.connect(g);g.connect(ac.destination);src.start();
  }catch(e){}
  setTimeout(chirp,8000+Math.random()*12000);
}
function chirp(){
  try{
    const ac=getSAC(),t=ac.currentTime,base=1600+Math.random()*600,n=2+Math.floor(Math.random()*2);
    for(let i=0;i<n;i++){
      const nt=t+i*.13;
      const o=ac.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(base+Math.random()*300,nt);o.frequency.exponentialRampToValueAtTime(base*.82,nt+.09);
      const g=ac.createGain();g.gain.setValueAtTime(0,nt);g.gain.linearRampToValueAtTime(.052,nt+.012);g.gain.exponentialRampToValueAtTime(.001,nt+.11);
      o.connect(g);g.connect(ac.destination);o.start(nt);o.stop(nt+.18);
    }
  }catch(e){}
  setTimeout(chirp,18000+Math.random()*28000);
}
function playToggleClick(){
  try{
    const ac=getSAC(),t=ac.currentTime;
    const len=Math.floor(ac.sampleRate*.025);
    const buf=ac.createBuffer(1,len,ac.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*.005));
    const src=ac.createBufferSource();src.buffer=buf;
    const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900;bp.Q.value=2.5;
    const g=ac.createGain();g.gain.value=.20;
    src.connect(bp);bp.connect(g);g.connect(ac.destination);src.start(t);
  }catch(e){}
}
function playFlipWhoosh(){
  try{
    const ac=getSAC(),t=ac.currentTime;
    const len=Math.floor(ac.sampleRate*.14);
    const buf=ac.createBuffer(1,len,ac.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.sin(i/len*Math.PI)*.5;
    const src=ac.createBufferSource();src.buffer=buf;
    const hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=400;
    const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2200;
    const g=ac.createGain();g.gain.value=.16;
    src.connect(hp);hp.connect(lp);lp.connect(g);g.connect(ac.destination);src.start(t);
  }catch(e){}
}

/* ====================================================================
   GLOBALS
   ==================================================================== */
let W=0,H=0,dpr=1,currentTier=1;
const NAV_H=44;
let tileW=100,tileH=62,tileEls=[];
let tickIdx=0; // 0=left highlighted, 1=right highlighted

/* Tier II */
let t2Idx=0;
const t2States=new Array(12).fill(0); // toggle state per pair
let t2AnimProg=1.0,t2AnimFrom=0;
let t2cv,t2ctx,t2W=0,t2H=0;

/* Tier IV items */
let t4cv,t4ctx,t4W=0,t4H=0;
let t4Items=[];

let coldDone=false,_firstInt=false;
let idleTimer=null,ssActive=false,savedTier=1;
const IDLE_MS=60000;

/* ====================================================================
   TIER I — split-panel tiles, left/right tick alternation
   ==================================================================== */
function drawTileCanvas(cv,pairIdx){
  const c=cv.getContext('2d');
  c.setTransform(1,0,0,1,0,0);c.clearRect(0,0,cv.width,cv.height);c.scale(dpr,dpr);
  const halfW=tileW/2,th=tileH,cy=th/2;
  const r=Math.min(halfW,th/2)*.70;
  const leftHi=(tickIdx===0);

  // Left half (state 0)
  c.save();c.beginPath();c.rect(0,0,halfW,th);c.clip();
  c.globalAlpha=leftHi?1.0:.28;
  if(leftHi){c.shadowColor='rgba(255,255,255,.45)';c.shadowBlur=r*.80;}
  PAIRS[pairIdx].draw(c,0,halfW/2,cy,r);
  c.restore();

  // Divider
  c.strokeStyle='rgba(255,255,255,.08)';c.lineWidth=1;
  c.beginPath();c.moveTo(halfW,3);c.lineTo(halfW,th-3);c.stroke();

  // Right half (state 1)
  c.save();c.beginPath();c.rect(halfW,0,halfW,th);c.clip();
  c.globalAlpha=leftHi?.28:1.0;
  if(!leftHi){c.shadowColor='rgba(255,255,255,.45)';c.shadowBlur=r*.80;}
  PAIRS[pairIdx].draw(c,1,halfW+halfW/2,cy,r);
  c.restore();
}

function redrawAllTiles(){tileEls.forEach((te,i)=>drawTileCanvas(te.canvas,i));}

function setupTiles(){
  const grid=document.getElementById('t1-grid');
  grid.innerHTML='';tileEls=[];
  grid.style.gridTemplateColumns='repeat(3,'+tileW+'px)';
  PAIRS.forEach((pair,i)=>{
    const tile=document.createElement('div');tile.className='tile';
    if(coldDone)tile.classList.add('on');
    const cv=document.createElement('canvas');cv.className='tile-cv';
    cv.width=Math.round(tileW*dpr);cv.height=Math.round(tileH*dpr);
    cv.style.width=tileW+'px';cv.style.height=tileH+'px';
    drawTileCanvas(cv,i);
    const lbl=document.createElement('span');lbl.className='tile-lbl';lbl.textContent=pair.label;
    tile.appendChild(cv);tile.appendChild(lbl);grid.appendChild(tile);
    const te={el:tile,canvas:cv,hover:false};tileEls.push(te);
    tile.addEventListener('pointerover',()=>te.hover=true);
    tile.addEventListener('pointerout',()=>te.hover=false);
    tile.addEventListener('pointerdown',e=>{e.preventDefault();onFirstInt();resetIdle();openTier2(i);});
  });
}

/* ====================================================================
   TIER II — interactive single-concept toggle
   ==================================================================== */
function setupT2(){t2cv=document.getElementById('t2-cv');t2ctx=t2cv.getContext('2d');}

function getT2Dims(){
  const maxW=Math.min(W*.80,320);
  const maxH=Math.min((H-NAV_H-136)*.88,300);
  const s=Math.floor(Math.min(maxW,maxH));
  return{w:s,h:Math.floor(s*1.06)};
}

function resizeT2(){
  const d=getT2Dims();t2W=d.w;t2H=d.h;
  t2cv.width=Math.round(t2W*dpr);t2cv.height=Math.round(t2H*dpr);
  t2cv.style.width=t2W+'px';t2cv.style.height=t2H+'px';
  t2ctx.setTransform(1,0,0,1,0,0);t2ctx.scale(dpr,dpr);
}

function drawT2Frame(){
  if(currentTier!==2)return;
  t2ctx.clearRect(0,0,t2W,t2H);
  if(t2AnimProg<1.0)t2AnimProg=Math.min(1.0,t2AnimProg+.065);
  const vp=PulseTock.vPulse;
  const curState=t2States[t2Idx];
  const pair=PAIRS[t2Idx];
  const drawFn=pair.drawT2||pair.draw;
  const cx=t2W/2,cy=t2H*.44;
  const r=Math.min(t2W,t2H)*.27;

  // Subtle background tints for certain pairs
  if(t2Idx===1||t2Idx===6||t2Idx===9){
    const tints={1:['rgba(80,36,6,.28)','rgba(6,20,60,.28)'],6:['rgba(55,36,6,.20)','rgba(4,4,4,.32)'],9:['rgba(55,28,4,.22)','rgba(4,6,22,.28)']};
    const [t0,t1]=tints[t2Idx]||['',''];
    if(t0)ctx_fill(t2ctx,curState===0?t0:t1,t2W,t2H);
  }

  t2ctx.save();
  t2ctx.shadowColor='rgba(255,255,255,'+(0.012+vp*.038)+')';
  t2ctx.shadowBlur=8+vp*18;
  if(t2AnimProg<1.0){
    t2ctx.globalAlpha=1.0-t2AnimProg;drawFn(t2ctx,t2AnimFrom,cx,cy,r);
    t2ctx.globalAlpha=t2AnimProg;drawFn(t2ctx,curState,cx,cy,r);
    t2ctx.globalAlpha=1.0;
  }else{
    drawFn(t2ctx,curState,cx,cy,r);
  }
  t2ctx.restore();

  // 2 state dots at bottom
  const dotY=t2H-10;
  [0,1].forEach(s=>{
    const dx=cx+(s-.5)*18;const active=s===curState;
    t2ctx.beginPath();t2ctx.arc(dx,dotY,active?4+vp*1.5:2.5,0,Math.PI*2);
    t2ctx.fillStyle=active?'rgba(255,255,255,'+(.68+vp*.24)+')':'rgba(255,255,255,.24)';
    t2ctx.fill();
  });

  const ta=document.getElementById('t2-touch');
  ta.style.opacity=.26+vp*.46;ta.style.transform='scale('+(1+vp*.03)+')';
}

function ctx_fill(c,color,w,h){if(!color)return;c.save();c.fillStyle=color;c.fillRect(0,0,w,h);c.restore();}

function openTier2(idx){
  t2Idx=idx;t2States[idx]=0;t2AnimProg=1.0;t2AnimFrom=0;
  document.getElementById('t2-name').textContent=PAIRS[idx].label;
  document.getElementById('t2-pat-counter').textContent=(idx+1)+' / 12';
  document.getElementById('t2-state-word').textContent=PAIRS[idx].left;
  switchTier(2);
}

function toggleT2State(){
  if(t2AnimProg<1.0)return;
  t2AnimFrom=t2States[t2Idx];
  t2States[t2Idx]=1-t2States[t2Idx];
  t2AnimProg=0.0;
  const s=t2States[t2Idx];
  document.getElementById('t2-state-word').textContent=s===0?PAIRS[t2Idx].left:PAIRS[t2Idx].right;
  playToggleClick();
}

/* ====================================================================
   TIER IV — tap to spawn pair, auto-flip to opposite, fade out
   ==================================================================== */
function setupT4(){t4cv=document.getElementById('t4-cv');t4ctx=t4cv.getContext('2d');}

function resizeT4(){
  t4W=W;t4H=H-NAV_H;
  t4cv.width=Math.round(t4W*dpr);t4cv.height=Math.round(t4H*dpr);
  t4cv.style.width=t4W+'px';t4cv.style.height=t4H+'px';
  t4ctx.setTransform(1,0,0,1,0,0);t4ctx.scale(dpr,dpr);
}

function spawnT4Item(x,y){
  const pairIdx=Math.floor(Math.random()*12);
  const now=Date.now();
  t4Items.push({
    pairIdx,x,y,
    spawnTime:now,
    flipStartTime:0,
    oppositeStartTime:0,
    fadeStartTime:0,
    phase:0, // 0=first, 1=flipping, 2=opposite, 3=fading
    flipProg:0,
    alpha:1.0
  });
}

function updateT4Items(){
  const now=Date.now();
  for(let i=t4Items.length-1;i>=0;i--){
    const it=t4Items[i];
    const age=now-it.spawnTime;
    if(it.phase===0&&age>=3500){
      it.phase=1;it.flipStartTime=now;playFlipWhoosh();
    }else if(it.phase===1){
      it.flipProg=Math.min(1.0,(now-it.flipStartTime)/480);
      if(it.flipProg>=1.0){it.phase=2;it.oppositeStartTime=now;}
    }else if(it.phase===2&&now-it.oppositeStartTime>=2000){
      it.phase=3;it.fadeStartTime=now;
    }else if(it.phase===3){
      it.alpha=Math.max(0,1.0-(now-it.fadeStartTime)/820);
      if(it.alpha<=0){t4Items.splice(i,1);}
    }
  }
}

function drawT4Item(item){
  const sz=Math.min(t4W,t4H)*.15;
  let drawState,scaleX;
  if(item.phase===0){drawState=0;scaleX=1.0;}
  else if(item.phase===1){
    if(item.flipProg<.5){drawState=0;scaleX=1.0-item.flipProg*2;}
    else{drawState=1;scaleX=(item.flipProg-.5)*2;}
  }else{drawState=1;scaleX=1.0;}

  t4ctx.save();
  t4ctx.globalAlpha=item.alpha;
  t4ctx.translate(item.x,item.y);
  t4ctx.scale(scaleX,1.0);

  // Card background
  t4ctx.fillStyle='rgba(8,10,18,.84)';
  t4ctx.strokeStyle='rgba(255,255,255,.08)';t4ctx.lineWidth=1;
  t4ctx.beginPath();t4ctx.rect(-sz*1.02,-sz*1.08,sz*2.04,sz*2.50);t4ctx.fill();t4ctx.stroke();

  // Concept drawing
  const pair=PAIRS[item.pairIdx];
  const drawFn=pair.drawT2||pair.draw;
  drawFn(t4ctx,drawState,0,-sz*.10,sz);

  // Concept word (only when card is visible)
  if(Math.abs(scaleX)>.08){
    const word=drawState===0?pair.left:pair.right;
    t4ctx.fillStyle='rgba(255,255,255,.72)';
    const fs=Math.max(9,sz*.32);
    t4ctx.font='bold '+fs+'px Courier New';
    t4ctx.textAlign='center';
    t4ctx.fillText(word,0,sz*.96);
  }
  t4ctx.restore();
}

function drawT4Frame(){
  t4ctx.clearRect(0,0,t4W,t4H);
  updateT4Items();
  t4Items.forEach(it=>drawT4Item(it));
  if(ssActive&&t4Items.length===0){
    spawnT4Item(t4W*(0.2+Math.random()*.6),t4H*(0.2+Math.random()*.6));
  }
}

/* ====================================================================
   NAVIGATION
   ==================================================================== */
function switchTier(n){
  currentTier=n;
  document.querySelectorAll('.tier').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('t'+n).classList.add('on');
  document.querySelector('[data-tier="'+n+'"]').classList.add('active');
  if(n===2)resizeT2();
}

/* ====================================================================
   SCREENSAVER
   ==================================================================== */
function resetIdle(){clearTimeout(idleTimer);idleTimer=setTimeout(startSS,IDLE_MS);}
function startSS(){
  if(ssActive)return;ssActive=true;savedTier=currentTier;
  document.getElementById('t4-ui').style.visibility='hidden';
  t4Items=[];switchTier(4);
  spawnT4Item(t4W*(0.2+Math.random()*.6),t4H*(0.2+Math.random()*.6));
}
function stopSS(){
  ssActive=false;t4Items=[];
  document.getElementById('t4-ui').style.visibility='visible';
  document.getElementById('t4-touch').style.opacity='1';
  if(savedTier===2)openTier2(t2Idx);else switchTier(savedTier);
}

/* ====================================================================
   FIRST INTERACTION + COLD OPEN
   ==================================================================== */
function onFirstInt(){
  if(_firstInt)return;_firstInt=true;
  PulseTock.start();PulseTock.setStage(7);
  startAmbient();
  PulseTock.onTick(()=>{tickIdx=1-tickIdx;redrawAllTiles();});
  PulseTock.onBeat(()=>{
    if(ssActive&&t4Items.length<5){
      spawnT4Item(t4W*(0.1+Math.random()*.8),t4H*(0.1+Math.random()*.8));
    }
  });
  resetIdle();
}

function doColdOpen(){
  setTimeout(()=>document.getElementById('bg').classList.add('on'),80);
  setTimeout(()=>{
    document.getElementById('nav').classList.add('on');
    document.getElementById('t1-hint').classList.add('on');
  },1900);
  setTimeout(()=>{
    tileEls.forEach((t,i)=>setTimeout(()=>t.el.classList.add('on'),i*55));
    coldDone=true;
  },2200);
}

/* ====================================================================
   MAIN RAF LOOP
   ==================================================================== */
function mainLoop(ts){
  Scene.draw(ts);
  if(tileEls.length){
    tileEls.forEach(te=>{
      te.canvas.style.filter=te.hover?'drop-shadow(0 0 5px rgba(255,255,255,.30))':'none';
    });
  }
  if(currentTier===2)drawT2Frame();
  if(currentTier===4||ssActive)drawT4Frame();
  requestAnimationFrame(mainLoop);
}

/* ====================================================================
   RESIZE + INIT
   ==================================================================== */
function resize(){
  dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;
  Scene.resize(W,H);
  const COLS=3,GAP=8,LABEL_H=14,ASPECT=0.62;
  const availW=W-20,availH=H-NAV_H-44,rows=4;
  const maxByW=Math.floor((availW-GAP*(COLS-1))/COLS);
  const maxByH=Math.floor((availH-GAP*(rows-1)-LABEL_H*rows)/rows/ASPECT);
  tileW=Math.min(Math.max(Math.min(maxByW,maxByH),68),152);
  tileH=Math.floor(tileW*ASPECT);
  setupTiles();
  if(currentTier===2)resizeT2();
  resizeT4();
}

Scene.init(document.getElementById('bg'));
setupT4();setupT2();
window.addEventListener('resize',resize);
resize();

/* ====================================================================
   EVENT LISTENERS
   ==================================================================== */
document.querySelectorAll('.tbtn').forEach(btn=>{
  btn.addEventListener('pointerdown',e=>{
    e.preventDefault();onFirstInt();resetIdle();
    const n=parseInt(btn.dataset.tier);
    if(n===2)openTier2(t2Idx);else switchTier(n);
  });
});

document.getElementById('t2-cv').addEventListener('pointerdown',e=>{
  e.stopPropagation();onFirstInt();resetIdle();toggleT2State();
});

document.getElementById('t2-prev').addEventListener('pointerdown',e=>{
  e.stopPropagation();onFirstInt();resetIdle();
  t2Idx=(t2Idx-1+12)%12;
  t2States[t2Idx]=0;t2AnimProg=1.0;t2AnimFrom=0;
  document.getElementById('t2-name').textContent=PAIRS[t2Idx].label;
  document.getElementById('t2-pat-counter').textContent=(t2Idx+1)+' / 12';
  document.getElementById('t2-state-word').textContent=PAIRS[t2Idx].left;
});

document.getElementById('t2-next').addEventListener('pointerdown',e=>{
  e.stopPropagation();onFirstInt();resetIdle();
  t2Idx=(t2Idx+1)%12;
  t2States[t2Idx]=0;t2AnimProg=1.0;t2AnimFrom=0;
  document.getElementById('t2-name').textContent=PAIRS[t2Idx].label;
  document.getElementById('t2-pat-counter').textContent=(t2Idx+1)+' / 12';
  document.getElementById('t2-state-word').textContent=PAIRS[t2Idx].left;
});

document.getElementById('t4-cv').addEventListener('pointerdown',e=>{
  if(ssActive){stopSS();return;}
  onFirstInt();resetIdle();
  const rect=t4cv.getBoundingClientRect();
  spawnT4Item(e.clientX-rect.left,(e.clientY-rect.top));
});

document.addEventListener('pointerdown',()=>{
  if(!_firstInt)return;
  if(ssActive)stopSS();else resetIdle();
});

doColdOpen();
requestAnimationFrame(mainLoop);
</script>
