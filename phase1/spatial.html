<script>
'use strict';
const PulseTock=(function(){
  let actx=null,hbSched=0,hbInt=1.12,nextTick=0,lastBeatJS=0,started=false;
  let stage=1,hbVol=1.0,tickVol=0.04,duckCur=1.0,duckTgt=1.0,duckRaf=null;
  const cbs=[],tickCbs=[];let _vp=0,rafOn=false;
  const MIX=[null,{hb:1.00,t:0.04},{hb:0.90,t:0.10},{hb:0.75,t:0.22},
    {hb:0.62,t:0.32},{hb:0.52,t:0.42},{hb:0.42,t:0.52},{hb:0.32,t:0.64},
    {hb:0.22,t:0.76},{hb:0.12,t:0.88},{hb:0.05,t:1.00}];
  function mix(){const m=MIX[stage]||MIX[1];hbVol=m.hb;tickVol=m.t;}
  function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx;}
  function thud(t,f,v,d){
    try{const x=ac(),vol=v*hbVol*duckCur;if(vol<.001)return;
      const o=x.createOscillator();o.type='sine';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*.48,t+d);
      const nL=Math.floor(x.sampleRate*(d+.06));const nb=x.createBuffer(1,nL,x.sampleRate);const nd=nb.getChannelData(0);
      for(let i=0;i<nL;i++)nd[i]=(Math.random()*2-1)*Math.exp(-i/(x.sampleRate*.032));
      const ns=x.createBufferSource();ns.buffer=nb;
      const lp1=x.createBiquadFilter();lp1.type='lowpass';lp1.frequency.value=90;
      const lp2=x.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=130;
      const og=x.createGain();og.gain.value=.58;const ng=x.createGain();ng.gain.value=.42;
      const env=x.createGain();env.gain.setValueAtTime(0,t);env.gain.linearRampToValueAtTime(vol,t+.013);env.gain.exponentialRampToValueAtTime(.001,t+d*2.4);

  function hb(t){thud(t,62,.68,.13);thud(t+.20,76,.42,.10);}
  function tick(t){
    try{const x=ac(),v=tickVol*duckCur;if(v<.001)return;
      const nL=Math.floor(x.sampleRate*.013);const buf=x.createBuffer(1,nL,x.sampleRate);const d=buf.getChannelData(0);
      for(let i=0;i<nL;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(x.sampleRate*.005));
      const s=x.createBufferSource();s.buffer=buf;
      const bp=x.createBiquadFilter();bp.type='bandpass';bp.frequency.value=420;bp.Q.value=3.2;
      const g=x.createGain();g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
      s.connect(bp);bp.connect(g);g.connect(x.destination);s.start(t);}catch(e){}}
  function ambient(){
    try{const x=ac();const buf=x.createBuffer(2,x.sampleRate*4,x.sampleRate);
      for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;}
      const s=x.createBufferSource();s.buffer=buf;s.loop=true;
      const l1=x.createBiquadFilter();l1.type='lowpass';l1.frequency.value=70;
      const l2=x.createBiquadFilter();l2.type='lowpass';l2.frequency.value=45;
      const g=x.createGain();g.gain.value=.022;
      s.connect(l1);l1.connect(l2);l2.connect(g);g.connect(x.destination);s.start();}catch(e){}}
  function sched(){const x=ac();
    while(hbSched<x.currentTime+.22){hb(hbSched);const delay=Math.max(0,(hbSched-x.currentTime)*1000);setTimeout(()=>{lastBeatJS=Date.now();cbs.forEach(fn=>{try{fn();}catch(e){}});},delay);hbInt=1.03+Math.random()*.19;hbSched+=hbInt;}
    while(nextTick<x.currentTime+.22){tick(nextTick);const td=Math.max(0,(nextTick-x.currentTime)*1000);setTimeout(()=>{tickCbs.forEach(fn=>{try{fn();}catch(e){}});},td);nextTick+=1.0;}}
  function rampDuck(){const d=duckTgt-duckCur;if(Math.abs(d)<.002){duckCur=duckTgt;duckRaf=null;return;}duckCur+=d*.04*3.5;duckRaf=requestAnimationFrame(rampDuck);}
  function setDuck(t){duckTgt=Math.max(.05,Math.min(1,t));if(!duckRaf)duckRaf=requestAnimationFrame(rampDuck);}
  function pulseLoop(){const s=(Date.now()-lastBeatJS)/1000;const lub=Math.max(0,1-s*11);const dub=s>.16?Math.max(0,1-(s-.20)*13)*.7:0;_vp=Math.max(lub,dub);requestAnimationFrame(pulseLoop);}
  return{
    start(){if(started){const x=ac();if(x.state==='suspended')x.resume();return;}started=true;mix();const x=ac();hbSched=x.currentTime+.35;nextTick=x.currentTime+.50;ambient();sched();setInterval(sched,110);if(!rafOn){rafOn=true;requestAnimationFrame(pulseLoop);}},
    setStage(s){stage=Math.max(1,Math.min(10,Math.round(s)));mix();},
    duck(t=.18){setDuck(t);},restore(){setDuck(1);},
    onBeat(fn){if(typeof fn==='function')cbs.push(fn);},
    onTick(fn){if(typeof fn==='function')tickCbs.push(fn);},
    get vPulse(){return _vp;},get stage(){return stage;}
  };

const Scene=(()=>{
  let cv,ctx,W,H,HZ,t0=null;
  let stars=[],rT=[],lT=[],rTx=[],lLn=[],fgB={l1:[],l2:[],r1:[],r2:[]},tufts=[];
  let MTN={};
  const C={sk0:'#020610',sk1:'#060e18',sk2:'#0a1420',gd0:'#0a1008',gd1:'#050704',hg:'rgba(28,52,22,.20)',mf:'#111e11',mn:'#192b19',ft:'#223022',ftd:'#1a261a',fb:'rgba(42,62,36,.90)',fbd:'rgba(32,48,28,.78)',mnl:'rgba(30,50,26,.88)',mfm:'rgba(20,34,18,.88)',tr:'#182018',trd:'#121a12',gr:'#1c2812',grh:'#243014'};
  function bz(t,p0,p1,p2,p3){const u=1-t;return u*u*u*p0+3*u*u*t*p1+3*u*t*t*p2+t*t*t*p3;}
  function mY(px,py,bl,br,x,hz){const il=x<=px;let x0,x1,x2,x3,y0,y1,y2,y3;if(il){x0=bl;y0=hz;const mL=bl+(px-bl)*.42;x1=mL;y1=hz-(hz-py)*.65;x2=mL+(px-mL)*.6;y2=py+6;x3=px;y3=py;}else{x0=px;y0=py;const mR=px+(br-px)*.58;x1=mR;y1=py+6;x2=mR+(br-mR)*.4;y2=hz-(hz-py)*.65;x3=br;y3=hz;}let lo=0,hi=1;for(let i=0;i<18;i++){const m=(lo+hi)*.5;bz(m,x0,x1,x2,x3)<x?lo=m:hi=m;}return bz((lo+hi)*.5,y0,y1,y2,y3);}
  function build(w,h,hz){
    MTN={r:{px:w*.76,py:h*.30,bl:w*.42,br:w*1.04},l:{px:w*.26,py:h*.24,bl:w*-.06,br:w*.58}};
    stars=[];for(let i=0;i<Math.floor(w*h/1900);i++)stars.push({x:Math.random()*w,y:Math.random()*hz*.9,r:Math.random()*.85+.18,b:Math.random()*.24+.04,p:Math.random()*Math.PI*2,s:.22+Math.random()*.42});
    rT=[];const rm=MTN.r;for(let i=0;i<200;i++){const tx=rm.bl+Math.random()*(rm.br-rm.bl);if(tx>w*1.01)continue;const sy=mY(rm.px,rm.py,rm.bl,rm.br,tx,hz);if(sy>=hz-h*.004)continue;rT.push({x:tx,y:sy,h:h*(.016+Math.random()*.016),w:h*(.005+Math.random()*.006)});}
    rTx=[];for(let i=0;i<260;i++){const tx=rm.bl+Math.random()*(rm.br-rm.bl);if(tx>w*1.01)continue;const sy=mY(rm.px,rm.py,rm.bl,rm.br,tx,hz);const ty=sy+Math.random()*(hz-sy)*.8;if(ty>=hz)continue;rTx.push({tx,ty,dot:Math.random()<.5,len:Math.random()*3.2+1.2,ang:(Math.random()-.5)*.9,a:.15+Math.random()*.19});}
    lT=[];const lm=MTN.l;for(let i=0;i<180;i++){const tx=lm.bl+Math.random()*(lm.br-lm.bl);const sy=mY(lm.px,lm.py,lm.bl,lm.br,tx,hz);if(sy>=hz-h*.004)continue;lT.push({x:tx,y:sy,h:h*(.022+Math.random()*.020),w:h*(.007+Math.random()*.008)});}
    lLn=[];for(let i=0;i<180;i++){const tx=lm.bl+Math.random()*(lm.br-lm.bl);const sy=mY(lm.px,lm.py,lm.bl,lm.br,tx,hz);const ty=sy+Math.random()*(hz-sy)*.85;if(ty>=hz)continue;lLn.push({tx,ty,len:h*(.016+Math.random()*.024),ang:-Math.PI*.30+(Math.random()-.5)*.45,a:.18+Math.random()*.26});}
    function mkB(cx,height,spread){const L=[];for(let t=0;t<4;t++){const fr=t/4,tT=hz-height*(.95-fr*.76),tB=hz-height*(.60-fr*.74)+height*.08,mid=(tT+tB)/2,tW=spread*(.28+fr*.72+.04),cnt=5+Math.floor(fr*9);for(let b=0;b<cnt;b++){const bf=b/cnt;L.push({x:cx-tW*.44+bf*tW*.88+(Math.random()-.5)*tW*.10,y:mid+(Math.random()-.5)*(tB-tT)*.72,len:h*(.011+Math.random()*.016),ang:-Math.PI*.20+(Math.random()-.5)*.5,a:.24+Math.random()*.32});}}return L;}
    fgB.l1=mkB(w*.09,h*.68,w*.130);fgB.l2=mkB(w*.20,h*.56,w*.118);fgB.r1=mkB(w*.83,h*.45,w*.086);fgB.r2=mkB(w*.93,h*.52,w*.098);
    tufts=[];for(let i=0;i<38;i++)tufts.push({x:w*(.12+Math.random()*.76),y:hz+h*(.06+Math.random()*.18),h:h*(.008+Math.random()*.009),sw:(Math.random()-.5)*.26,p:Math.random()*Math.PI*2});}
  function fillM(m,col,hz){const{px,py,bl,br}=m;ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(bl,hz);const mL=bl+(px-bl)*.42,mR=px+(br-px)*.58;ctx.bezierCurveTo(mL,hz-(hz-py)*.65,mL+(px-mL)*.6,py+6,px,py);ctx.bezierCurveTo(mR,py+6,mR+(br-mR)*.4,hz-(hz-py)*.65,br,hz);ctx.lineTo(br,hz);ctx.lineTo(bl,hz);ctx.closePath();ctx.fill();}
  function hTree(x,y,th,tw,col){ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x,y-th);ctx.lineTo(x+tw*.36,y-th*.36);ctx.lineTo(x-tw*.36,y-th*.36);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(x,y-th*.58);ctx.lineTo(x+tw*.50,y);ctx.lineTo(x-tw*.50,y);ctx.closePath();ctx.fill();}
  function fgTree(cx,ht,sp,col,tCol){const by=HZ-3;for(let t=0;t<4;t++){const f=t/4,tT=by-ht*(.95-f*.76),tB=by-ht*(.60-f*.74)+ht*.08,tW=sp*(.28+f*.72+.04);ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(cx,tT);ctx.lineTo(cx+tW/2,tB);ctx.lineTo(cx-tW/2,tB);ctx.closePath();ctx.fill();}const tw=Math.max(4,sp*.08),tTop=by-ht*.11;ctx.fillStyle=tCol;ctx.fillRect(cx-tw/2,tTop,tw,(HZ+4)-tTop);}
  function brLines(marks,col){ctx.save();ctx.strokeStyle=col;ctx.lineCap='round';ctx.lineWidth=1.3;marks.forEach(m=>{ctx.globalAlpha=m.a;ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(m.x+Math.cos(m.ang)*m.len,m.y+Math.sin(m.ang)*m.len);ctx.stroke();});ctx.restore();}
  function stream(t){const sx=W*.03,sy=H*.80,ex=W*.26,ey=HZ+H*.018,c1x=W*.07,c1y=H*.84,c2x=W*.16,c2y=H*.72;ctx.save();const sg=ctx.createLinearGradient(sx,sy,ex,ey);sg.addColorStop(0,'rgba(8,18,30,0)');sg.addColorStop(.3,'rgba(14,30,48,.48)');sg.addColorStop(.72,'rgba(16,32,52,.38)');sg.addColorStop(1,'rgba(10,20,36,0)');ctx.strokeStyle=sg;ctx.lineWidth=W*.022;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(sx,sy);ctx.bezierCurveTo(c1x,c1y,c2x,c2y,ex,ey);ctx.stroke();const shi=(Math.sin(t*1.3)*.5+.5)*.09+.04;ctx.strokeStyle='rgba(50,100,140,'+shi+')';ctx.lineWidth=W*.005;ctx.beginPath();ctx.moveTo(sx+W*.01,sy+H*.004);ctx.bezierCurveTo(c1x+W*.01,c1y,c2x,c2y,ex,ey);ctx.stroke();ctx.restore();}
  function stageEl(w,h){const sw=Math.min(w*.26,210),sh=h*.016,sx=w*.5-sw/2,sy=h-h*.034-sh;ctx.save();ctx.fillStyle=C.trd;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(sx,sy,sw,sh,2);else ctx.rect(sx,sy,sw,sh);ctx.fill();ctx.fillStyle='rgba(80,70,48,.13)';ctx.fillRect(sx+2,sy,sw-4,1.5);ctx.restore();}
  return{
    init(canvas){cv=canvas;ctx=cv.getContext('2d');},
    resize(w,h){W=w;H=h;const asp=W/H,tt=Math.max(0,Math.min(1,(asp-.6)/.8));HZ=H*(.70+tt*.04);const dp=window.devicePixelRatio||1;cv.width=Math.round(W*dp);cv.height=Math.round(H*dp);cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(1,0,0,1,0,0);ctx.scale(dp,dp);build(W,H,HZ);},
    draw(ts){if(!t0)t0=ts;const t=(ts-t0)/1000;ctx.clearRect(0,0,W,H);
      const sky=ctx.createLinearGradient(0,0,0,HZ);sky.addColorStop(0,C.sk0);sky.addColorStop(.55,C.sk1);sky.addColorStop(1,C.sk2);ctx.fillStyle=sky;ctx.fillRect(0,0,W,HZ+H*.05);

      stars.forEach(s=>{const tw=s.b+(Math.sin(t*s.s+s.p)*.5+.5)*.10;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(215,220,255,'+tw+')';ctx.fill();});

      ctx.save();ctx.lineCap='round';rTx.forEach(m=>{ctx.globalAlpha=m.a;if(m.dot){ctx.fillStyle=C.mfm;ctx.beginPath();ctx.arc(m.tx,m.ty,m.len*.38,0,Math.PI*2);ctx.fill();}else{ctx.strokeStyle=C.mfm;ctx.lineWidth=1.1;ctx.beginPath();ctx.moveTo(m.tx,m.ty);ctx.lineTo(m.tx+Math.cos(m.ang)*m.len,m.ty+Math.sin(m.ang)*m.len);ctx.stroke();}});ctx.restore();

      ctx.save();ctx.strokeStyle=C.mnl;ctx.lineCap='round';ctx.lineWidth=1.4;lLn.forEach(m=>{ctx.globalAlpha=m.a;ctx.beginPath();ctx.moveTo(m.tx,m.ty);ctx.lineTo(m.tx+Math.cos(m.ang)*m.len,m.ty+Math.sin(m.ang)*m.len);ctx.stroke();});ctx.restore();
      stream(t);

  if(state===0){ctx.fillStyle='#558B2F';ctx.beginPath();ctx.ellipse(cx+r*.72,sY-r*.06,r*.24,r*.18,.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1A1A2E';ctx.beginPath();ctx.arc(cx+r*.84,sY-r*.16,Math.max(.5,r*.06),0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.60)';ctx.beginPath();ctx.arc(cx+r*.87,sY-r*.19,Math.max(.3,r*.03),0,Math.PI*2);ctx.fill();ctx.fillStyle='#558B2F';ctx.beginPath();ctx.ellipse(cx+r*.50,sY+r*.44,r*.18,r*.11,.6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx-r*.50,sY+r*.44,r*.18,r*.11,-.6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+r*.36,sY+r*.56,r*.16,r*.09,.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx-r*.36,sY+r*.56,r*.16,r*.09,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx-r*.70,sY,r*.14,r*.09,-.4,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

function drawBallUnderTable(ctx,cx,cy,r,state){
  ctx.save();const tTop=cy-r*.20,tH=r*.15,tW=r*1.52,tX=cx-tW/2,legH=r*.68,legW=r*.12;
  function table(){ctx.fillStyle='#A0522D';ctx.fillRect(tX,tTop,tW,tH);ctx.fillStyle='rgba(200,160,100,.25)';ctx.fillRect(tX+r*.06,tTop+r*.03,tW-r*.12,r*.05);ctx.fillStyle='#8B4513';ctx.fillRect(tX+r*.10,tTop+tH,legW,legH);ctx.fillRect(tX+tW-r*.10-legW,tTop+tH,legW,legH);}
  function ball(bx,by){ctx.fillStyle='#FF4444';ctx.shadowColor='#FF4444';ctx.shadowBlur=Math.max(2,r*.36);ctx.beginPath();ctx.arc(bx,by,Math.max(.5,r*.24),0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.40)';ctx.beginPath();ctx.arc(bx-r*.06,by-r*.07,Math.max(.3,r*.10),0,Math.PI*2);ctx.fill();}
  if(state===0){table();ball(tX-r*.30,tTop+legH*.55);}
  else{table();ctx.fillStyle='rgba(0,0,0,.14)';ctx.beginPath();ctx.ellipse(cx,tTop+tH+legH*.50,r*.32,r*.07,0,0,Math.PI*2);ctx.fill();ball(cx,tTop+tH+legH*.40);}
  ctx.restore();
}

function drawFlowerBehindFence(ctx,cx,cy,r,state){
  ctx.save();const nP=5,pW=r*.11,pGap=r*.055,fW=nP*pW+(nP-1)*pGap,fX=cx-fW*.50,fTop=cy-r*.20;
  function fence(){ctx.fillStyle='#C4A252';ctx.fillRect(fX-r*.04,fTop+r*.18,fW+r*.08,r*.07);ctx.fillRect(fX-r*.04,fTop+r*.60,fW+r*.08,r*.07);ctx.fillStyle='#D2B48C';for(let p=0;p<nP;p++){const px=fX+p*(pW+pGap);ctx.fillRect(px,fTop,pW,r*.80);ctx.beginPath();ctx.moveTo(px,fTop);ctx.lineTo(px+pW*.5,fTop-r*.13);ctx.lineTo(px+pW,fTop);ctx.closePath();ctx.fill();}}
  function flower(fcy){ctx.strokeStyle='#4CAF50';ctx.lineWidth=Math.max(.5,r*.055);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,fcy);ctx.lineTo(cx,fcy+r*.50);ctx.stroke();ctx.fillStyle='#FF69B4';for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.ellipse(cx+Math.cos(a)*r*.22,fcy+Math.sin(a)*r*.22,r*.13,r*.07,a,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=Math.max(1,r*.18);ctx.beginPath();ctx.arc(cx,fcy,Math.max(.5,r*.11),0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
  if(state===0){fence();flower(cy-r*.38);}
  else{ctx.strokeStyle='#4CAF50';ctx.lineWidth=Math.max(.5,r*.055);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,fTop-r*.02);ctx.lineTo(cx,fTop+r*.72);ctx.stroke();fence();ctx.save();ctx.beginPath();ctx.rect(-r*100,-r*100,r*200+cx*2,r*100+fTop);ctx.clip();flower(fTop+r*.06);ctx.restore();}
  ctx.restore();
}

function drawExitRight(ctx,cx,cy,r,state){
  ctx.save();
  if(state===0){_frog(ctx,cx,cy,r,false);if(r>16){ctx.fillStyle='rgba(200,255,200,.30)';ctx.beginPath();ctx.moveTo(cx+r*.72,cy);ctx.lineTo(cx+r*.54,cy-r*.12);ctx.lineTo(cx+r*.54,cy+r*.12);ctx.closePath();ctx.fill();}}
  else{const fx=cx===0?r*1.50:cx*1.92;_frog(ctx,fx,cy,r,false);const ax=cx===0?r*.18:cx*2-r*.22;ctx.fillStyle='rgba(100,200,100,.55)';ctx.beginPath();ctx.moveTo(ax,cy);ctx.lineTo(ax-r*.18,cy-r*.12);ctx.lineTo(ax-r*.18,cy+r*.12);ctx.closePath();ctx.fill();}
  ctx.restore();
}

const CONCEPTS=[
  {label:'PEEK\u00B7A\u00B7BOO', words:['VISIBLE','HIDING'],   draw:drawPeekABoo},
  {label:'BEHIND HILL',          words:['VISIBLE','BEHIND'],    draw:drawBehindHill},
  {label:'IN A BOX',             words:['OUT','INSIDE'],        draw:drawKittyInBox},
  {label:'UNDER BLANKET',        words:['VISIBLE','UNDER'],     draw:drawStarUnderBlanket},
  {label:'BEHIND ROCK',          words:['VISIBLE','BEHIND'],    draw:drawFishBehindRock},
  {label:'EXIT LEFT',            words:['HERE','\u2190 LEFT'],  draw:drawExitLeft},
  {label:'IN BIRDHOUSE',         words:['OUTSIDE','INSIDE'],    draw:drawBirdInBirdhouse},
  {label:'BEHIND CLOUD',         words:['VISIBLE','BEHIND'],    draw:drawMoonBehindCloud},
  {label:'IN A SHELL',           words:['OUT','INSIDE'],        draw:drawTurtleInShell},
  {label:'UNDER TABLE',          words:['VISIBLE','UNDER'],     draw:drawBallUnderTable},
  {label:'BEHIND FENCE',         words:['IN FRONT','BEHIND'],   draw:drawFlowerBehindFence},
  {label:'EXIT RIGHT',           words:['HERE','RIGHT \u2192'], draw:drawExitRight},
];
let _sac=null;
function getSAC(){if(!_sac)_sac=new(window.AudioContext||window.webkitAudioContext)();if(_sac.state==='suspended')_sac.resume();return _sac;}
let _ambStarted=false;
function startAmbient(){
  if(_ambStarted)return;_ambStarted=true;
  try{const ac=getSAC();const len=ac.sampleRate*4,buf=ac.createBuffer(1,len,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;const src=ac.createBufferSource();src.buffer=buf;src.loop=true;const lp1=ac.createBiquadFilter();lp1.type='lowpass';lp1.frequency.value=800;const lp2=ac.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=500;const hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=150;const lfo=ac.createOscillator();lfo.frequency.value=.10;const lfog=ac.createGain();lfog.gain.value=220;lfo.connect(lfog);lfog.connect(lp1.frequency);lfo.start();const g=ac.createGain();g.gain.setValueAtTime(0,ac.currentTime);g.gain.linearRampToValueAtTime(.065,ac.currentTime+2.2);src.connect(lp1);lp1.connect(lp2);lp2.connect(hp);hp.connect(g);g.connect(ac.destination);src.start();}catch(e){}
  setTimeout(chirp,8000+Math.random()*12000);
}
function chirp(){try{const ac=getSAC(),t=ac.currentTime,base=1600+Math.random()*600,n=2+Math.floor(Math.random()*2);for(let i=0;i<n;i++){const nt=t+i*.13;const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(base+Math.random()*300,nt);o.frequency.exponentialRampToValueAtTime(base*.82,nt+.09);const g=ac.createGain();g.gain.setValueAtTime(0,nt);g.gain.linearRampToValueAtTime(.052,nt+.012);g.gain.exponentialRampToValueAtTime(.001,nt+.11);o.connect(g);g.connect(ac.destination);o.start(nt);o.stop(nt+.18);}}catch(e){}setTimeout(chirp,18000+Math.random()*28000);}
function playToggleClick(){try{const ac=getSAC(),t=ac.currentTime;const len=Math.floor(ac.sampleRate*.025);const buf=ac.createBuffer(1,len,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*.005));const src=ac.createBufferSource();src.buffer=buf;const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900;bp.Q.value=2.5;const g=ac.createGain();g.gain.value=.20;src.connect(bp);bp.connect(g);g.connect(ac.destination);src.start(t);}catch(e){}}
function playRustle(){try{const ac=getSAC(),t=ac.currentTime;const len=Math.floor(ac.sampleRate*.08);const buf=ac.createBuffer(1,len,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*.025));const src=ac.createBufferSource();src.buffer=buf;const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=600;const g=ac.createGain();g.gain.setValueAtTime(.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);src.connect(lp);lp.connect(g);g.connect(ac.destination);src.start(t);}catch(e){}}
function playChime(){try{const ac=getSAC(),t=ac.currentTime,freq=880+Math.random()*440;const o=ac.createOscillator();o.type='sine';o.frequency.value=freq;const g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.055,t+.012);g.gain.exponentialRampToValueAtTime(.001,t+.52);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+.60);}catch(e){}}
function playBloomChord(){try{const ac=getSAC();[329.63,392.0,493.88,587.33].forEach((freq,i)=>{const t=ac.currentTime+i*.060;const o=ac.createOscillator();o.type='sine';o.frequency.value=freq;const g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.075,t+.040);g.gain.exponentialRampToValueAtTime(.001,t+.82);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+.95);});}catch(e){}}

let W=0,H=0,dpr=1,currentTier=1;
const NAV_H=44;
let tileW=100,tileH=62,tileEls=[];
let tickCount=0,t1Phase=0;
let t2Idx=0,t2State=0,t2AnimProg=1.0,t2AnimFrom=0;
let t2cv,t2ctx,t2W=0,t2H=0;
let t4cv,t4ctx,t4W=0,t4H=0,t4Items=[];
let coldDone=false,_firstInt=false;
let idleTimer=null,ssActive=false,savedTier=1;
const IDLE_MS=60000;

function drawTileCanvas(cv,idx){const c=cv.getContext('2d');c.setTransform(1,0,0,1,0,0);c.clearRect(0,0,cv.width,cv.height);c.scale(dpr,dpr);const cx=tileW/2,cy=tileH/2,r=Math.min(tileW,tileH)*.30;CONCEPTS[idx].draw(c,cx,cy,r,t1Phase);}
function redrawAllTiles(){tileEls.forEach((te,i)=>drawTileCanvas(te.canvas,i));}
function setupTiles(){
  const grid=document.getElementById('t1-grid');grid.innerHTML='';tileEls=[];
  grid.style.gridTemplateColumns='repeat(3,'+tileW+'px)';
  CONCEPTS.forEach((con,i)=>{
    const tile=document.createElement('div');tile.className='tile';if(coldDone)tile.classList.add('on');
    const cv=document.createElement('canvas');cv.className='tile-cv';cv.width=Math.round(tileW*dpr);cv.height=Math.round(tileH*dpr);cv.style.width=tileW+'px';cv.style.height=tileH+'px';drawTileCanvas(cv,i);
    const lbl=document.createElement('span');lbl.className='tile-lbl';lbl.textContent=con.label;
    tile.appendChild(cv);tile.appendChild(lbl);grid.appendChild(tile);
    const te={el:tile,canvas:cv,hover:false};tileEls.push(te);
    tile.addEventListener('pointerover',()=>te.hover=true);tile.addEventListener('pointerout',()=>te.hover=false);
    tile.addEventListener('pointerdown',e=>{e.preventDefault();onFirstInt();resetIdle();openTier2(i);});
  });
}

function setupT2(){t2cv=document.getElementById('t2-cv');t2ctx=t2cv.getContext('2d');}
function getT2Dims(){const avW=Math.min(W*.82,310),avH=Math.min((H-NAV_H-140)*.80,310),side=Math.min(avW,avH);return{w:Math.floor(side),h:Math.floor(side*1.04)};}
function resizeT2(){const d=getT2Dims();t2W=d.w;t2H=d.h;t2cv.width=Math.round(t2W*dpr);t2cv.height=Math.round(t2H*dpr);t2cv.style.width=t2W+'px';t2cv.style.height=t2H+'px';t2ctx.setTransform(1,0,0,1,0,0);t2ctx.scale(dpr,dpr);}
function drawT2Frame(){
  if(currentTier!==2)return;t2ctx.clearRect(0,0,t2W,t2H);
  if(t2AnimProg<1.0)t2AnimProg=Math.min(1.0,t2AnimProg+.065);
  const vp=PulseTock.vPulse,cx=t2W/2,cy=t2H/2,r=Math.min(t2W,t2H)*.32;
  if(t2AnimProg<1.0){t2ctx.save();t2ctx.globalAlpha=1.0-t2AnimProg;CONCEPTS[t2Idx].draw(t2ctx,cx,cy,r,t2AnimFrom);t2ctx.restore();t2ctx.save();t2ctx.globalAlpha=t2AnimProg;CONCEPTS[t2Idx].draw(t2ctx,cx,cy,r,t2State);t2ctx.restore();}
  else{CONCEPTS[t2Idx].draw(t2ctx,cx,cy,r,t2State);}
  const dotY=t2H-11,dcx=t2W/2;
  for(let s=0;s<2;s++){const dx=dcx+(s-.5)*18,act=s===t2State;t2ctx.beginPath();t2ctx.arc(dx,dotY,act?4+vp*1.5:2.5,0,Math.PI*2);t2ctx.fillStyle=act?'rgba(255,255,255,'+(0.68+vp*.24)+')':'rgba(255,255,255,.24)';t2ctx.fill();}
  const ta=document.getElementById('t2-touch');ta.style.opacity=0.26+vp*.46;ta.style.transform='scale('+(1+vp*.03)+')';
}
function openTier2(idx){t2Idx=idx;t2State=0;t2AnimProg=1.0;t2AnimFrom=0;document.getElementById('t2-name').textContent=CONCEPTS[idx].label;document.getElementById('t2-pat-counter').textContent=(idx+1)+' / 12';document.getElementById('t2-state-word').textContent=CONCEPTS[idx].words[0];switchTier(2);}
function cycleT2State(){if(t2AnimProg<1.0)return;t2AnimFrom=t2State;t2State=1-t2State;t2AnimProg=0.0;document.getElementById('t2-state-word').textContent=CONCEPTS[t2Idx].words[t2State];playToggleClick();}

function setupT4(){t4cv=document.getElementById('t4-cv');t4ctx=t4cv.getContext('2d');}
function resizeT4(){dpr=window.devicePixelRatio||1;t4W=window.innerWidth;t4H=window.innerHeight-NAV_H;t4cv.width=Math.round(t4W*dpr);t4cv.height=Math.round(t4H*dpr);t4cv.style.width=t4W+'px';t4cv.style.height=t4H+'px';t4ctx.setTransform(1,0,0,1,0,0);t4ctx.scale(dpr,dpr);}
function spawnT4Vignette(tx,ty){
  const now=Date.now(),idx=Math.floor(Math.random()*12),sz=Math.min(Math.min(t4W,t4H)*.11,62);
  tx=Math.max(sz*1.6,Math.min(t4W-sz*1.6,tx));ty=Math.max(sz*1.6,Math.min(t4H-sz*1.6,ty));
  const ang=Math.random()*Math.PI*2,spd=150+Math.random()*180;
  t4Items.push({idx,x:tx,y:ty,r:sz,state:0,phase:'showing_a',phaseStart:now,alpha:1.0,scale:1.0,scatterStartX:tx,scatterStartY:ty,scatterVx:Math.cos(ang)*spd,scatterVy:Math.sin(ang)*spd-50});
  playChime();
}
function updateT4Items(){
  const now=Date.now();
  for(let i=t4Items.length-1;i>=0;i--){
    const it=t4Items[i];if(it.phase==='done'){t4Items.splice(i,1);continue;}const age=now-it.phaseStart;
    if(it.phase==='showing_a'){it.state=0;if(age>=2000){it.phase='showing_b';it.phaseStart=now;playRustle();}}
    else if(it.phase==='showing_b'){it.state=1;if(age>=2000){it.phase='blooming';it.phaseStart=now;playBloomChord();}}
    else if(it.phase==='blooming'){const t=Math.min(1.0,age/180);it.scale=1.0+t*.60;if(t>=1.0){it.phase='scattering';it.phaseStart=now;it.scatterStartX=it.x;it.scatterStartY=it.y;}}
    else if(it.phase==='scattering'){const el=(now-it.phaseStart)/1000,t=Math.min(1.0,el/.50);it.alpha=1.0-t;it.x=it.scatterStartX+it.scatterVx*el;it.y=it.scatterStartY+it.scatterVy*el;if(t>=1.0)it.phase='done';}
  }
}
function drawT4Frame(){t4ctx.clearRect(0,0,t4W,t4H);updateT4Items();t4Items.forEach(it=>{if(it.phase==='done')return;t4ctx.save();t4ctx.globalAlpha=it.alpha;t4ctx.translate(it.x,it.y);if(it.scale!==1.0)t4ctx.scale(it.scale,it.scale);CONCEPTS[it.idx].draw(t4ctx,0,0,it.r,it.state);t4ctx.restore();});if(ssActive&&t4Items.length===0){spawnT4Vignette(t4W*(0.18+Math.random()*.64),t4H*(0.28+Math.random()*.55));}}

function switchTier(n){currentTier=n;document.querySelectorAll('.tier').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));document.getElementById('t'+n).classList.add('on');document.querySelector('[data-tier="'+n+'"]').classList.add('active');if(n===2)resizeT2();}

function resetIdle(){clearTimeout(idleTimer);idleTimer=setTimeout(startSS,IDLE_MS);}
function startSS(){if(ssActive)return;ssActive=true;savedTier=currentTier;document.getElementById('t4-ui').style.visibility='hidden';t4Items=[];switchTier(4);spawnT4Vignette(t4W*(0.18+Math.random()*.64),t4H*(0.28+Math.random()*.55));}
function stopSS(){ssActive=false;t4Items=[];document.getElementById('t4-ui').style.visibility='visible';document.getElementById('t4-touch').style.opacity='1';if(savedTier===2)openTier2(t2Idx);else switchTier(savedTier);}

function onFirstInt(){if(_firstInt)return;_firstInt=true;PulseTock.start();PulseTock.setStage(9);startAmbient();PulseTock.onTick(()=>{tickCount++;t1Phase=Math.floor(tickCount/2)%2;redrawAllTiles();});PulseTock.onBeat(()=>{if(ssActive&&t4Items.length<3){spawnT4Vignette(t4W*(0.15+Math.random()*.70),t4H*(0.25+Math.random()*.58));}});resetIdle();}
function doColdOpen(){setTimeout(()=>document.getElementById('bg').classList.add('on'),80);setTimeout(()=>{document.getElementById('nav').classList.add('on');document.getElementById('t1-hint').classList.add('on');},1900);setTimeout(()=>{tileEls.forEach((t,i)=>setTimeout(()=>t.el.classList.add('on'),i*55));coldDone=true;},2200);}

function mainLoop(ts){Scene.draw(ts);if(tileEls.length){tileEls.forEach(te=>{te.canvas.style.filter=te.hover?'drop-shadow(0 0 5px rgba(255,255,255,.30))':'none';});}if(currentTier===2)drawT2Frame();if(currentTier===4||ssActive)drawT4Frame();requestAnimationFrame(mainLoop);}

function resize(){dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;Scene.resize(W,H);const COLS=3,GAP=8,LABEL_H=14,ASPECT=0.62,availW=W-20,availH=H-NAV_H-44,rows=4;const maxByW=Math.floor((availW-GAP*(COLS-1))/COLS),maxByH=Math.floor((availH-GAP*(rows-1)-LABEL_H*rows)/rows/ASPECT);tileW=Math.min(Math.max(Math.min(maxByW,maxByH),68),152);tileH=Math.floor(tileW*ASPECT);setupTiles();if(currentTier===2)resizeT2();resizeT4();}

Scene.init(document.getElementById('bg'));
setupT4();setupT2();
window.addEventListener('resize',resize);
resize();

document.querySelectorAll('.tbtn').forEach(btn=>{btn.addEventListener('pointerdown',e=>{e.preventDefault();onFirstInt();resetIdle();const n=parseInt(btn.dataset.tier);if(n===2)openTier2(t2Idx);else switchTier(n);});});
document.getElementById('t2-cv').addEventListener('pointerdown',e=>{e.stopPropagation();onFirstInt();resetIdle();cycleT2State();});
document.getElementById('t2-prev').addEventListener('pointerdown',e=>{e.stopPropagation();onFirstInt();resetIdle();t2Idx=(t2Idx-1+12)%12;t2State=0;t2AnimProg=1.0;t2AnimFrom=0;document.getElementById('t2-name').textContent=CONCEPTS[t2Idx].label;document.getElementById('t2-pat-counter').textContent=(t2Idx+1)+' / 12';document.getElementById('t2-state-word').textContent=CONCEPTS[t2Idx].words[0];});
document.getElementById('t2-next').addEventListener('pointerdown',e=>{e.stopPropagation();onFirstInt();resetIdle();t2Idx=(t2Idx+1)%12;t2State=0;t2AnimProg=1.0;t2AnimFrom=0;document.getElementById('t2-name').textContent=CONCEPTS[t2Idx].label;document.getElementById('t2-pat-counter').textContent=(t2Idx+1)+' / 12';document.getElementById('t2-state-word').textContent=CONCEPTS[t2Idx].words[0];});
document.getElementById('t4-cv').addEventListener('pointerdown',e=>{if(ssActive){stopSS();return;}onFirstInt();resetIdle();const rect=t4cv.getBoundingClientRect();spawnT4Vignette(e.clientX-rect.left,e.clientY-rect.top);});
document.addEventListener('pointerdown',()=>{if(!_firstInt)return;if(ssActive)stopSS();else resetIdle();});

doColdOpen();
requestAnimationFrame(mainLoop);
</script>
