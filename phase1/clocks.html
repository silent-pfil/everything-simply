<!DOCTYPE html>
<html lang="en">
<head>

<title>Clocks · Phase 1 · Simply Everything</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',Courier,monospace;touch-action:none;}
#bg{position:fixed;inset:0;width:100%;height:100%;opacity:0;transition:opacity 1.6s ease;z-index:0;pointer-events:none;}
#bg.on{opacity:.70;}
#nav{position:fixed;top:0;left:0;right:0;height:44px;display:flex;background:rgba(0,0,0,.82);border-bottom:1px solid rgba(255,255,255,.05);z-index:100;opacity:0;transition:opacity .6s ease;}
#nav.on{opacity:1;}
.tbtn{flex:1;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-bottom:2px solid transparent;transition:border-color .18s;}
.tbtn.active{border-bottom-color:rgba(255,255,255,.45);}
.btier{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.26);text-transform:uppercase;pointer-events:none;}
.bname{font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,.40);text-transform:uppercase;pointer-events:none;}
.tbtn.active .btier{color:rgba(255,255,255,.44);}
.tbtn.active .bname{color:rgba(255,255,255,.90);}
.tier{position:fixed;top:44px;left:0;right:0;bottom:0;z-index:10;display:none;flex-direction:column;align-items:center;}
.tier.on{display:flex;}
#t1{justify-content:flex-start;position:relative;}
#t1-subtitle{font-size:7px;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,255,255,.18);text-align:center;padding:9px 0 2px;user-select:none;opacity:0;transition:opacity .8s ease .2s;}

.tile-lbl{font-size:6px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.20);margin-top:4px;filter:blur(.7px);user-select:none;}

.navbtn{background:transparent;border:1px solid rgba(255,255,255,.10);cursor:pointer;padding:6px 13px;color:rgba(255,255,255,.55);font-size:13px;font-family:'Courier New',Courier,monospace;transition:border-color .15s;}
.navbtn:hover{border-color:rgba(255,255,255,.30);}

</style>

<body>
<canvas id="bg" aria-hidden="true"></canvas>

<script>
'use strict';
const PulseTock=(function(){
  let actx=null,hbSched=0,hbInt=1.12,nextTick=0,lastBeatJS=0,started=false;
  let stage=1,hbVol=1.0,tickVol=0.04,duckCur=1.0,duckTgt=1.0,duckRaf=null;
  const cbs=[],tickCbs=[];let _vp=0,rafOn=false;
  const MIX=[null,{hb:1.00,t:0.04},{hb:0.90,t:0.10},{hb:0.75,t:0.22},
    {hb:0.62,t:0.32},{hb:0.52,t:0.42},{hb:0.42,t:0.52},{hb:0.32,t:0.64},
    {hb:0.22,t:0.76},{hb:0.12,t:0.88},{hb:0.05,t:1.00}];
  function mix(){const m=MIX[stage]||MIX[1];hbVol=m.hb;tickVol=m.t;}
  function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx;}
  function thud(t,f,v,d){
    try{const x=ac(),vol=v*hbVol*duckCur;if(vol<.001)return;
      const o=x.createOscillator();o.type='sine';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*.48,t+d);
      const nL=Math.floor(x.sampleRate*(d+.06));const nb=x.createBuffer(1,nL,x.sampleRate);const nd=nb.getChannelData(0);
      for(let i=0;i<nL;i++)nd[i]=(Math.random()*2-1)*Math.exp(-i/(x.sampleRate*.032));
      const ns=x.createBufferSource();ns.buffer=nb;
      const lp1=x.createBiquadFilter();lp1.type='lowpass';lp1.frequency.value=90;
      const lp2=x.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=130;
      const og=x.createGain();og.gain.value=.58;const ng=x.createGain();ng.gain.value=.42;
      const env=x.createGain();env.gain.setValueAtTime(0,t);env.gain.linearRampToValueAtTime(vol,t+.013);env.gain.exponentialRampToValueAtTime(.001,t+d*2.4);
      o.connect(og);og.connect(lp1);ns.connect(ng);ng.connect(lp1);lp1.connect(lp2);lp2.connect(env);env.connect(x.destination);o.start(t);o.stop(t+d*3);ns.start(t);}catch(e){}}
  function hb(t){thud(t,62,.68,.13);thud(t+.20,76,.42,.10);}
  function tick(t){
    try{const x=ac(),v=tickVol*duckCur;if(v<.001)return;
      const nL=Math.floor(x.sampleRate*.013);const buf=x.createBuffer(1,nL,x.sampleRate);const d=buf.getChannelData(0);
      for(let i=0;i<nL;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(x.sampleRate*.005));
      const s=x.createBufferSource();s.buffer=buf;
      const bp=x.createBiquadFilter();bp.type='bandpass';bp.frequency.value=420;bp.Q.value=3.2;
      const g=x.createGain();g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
      s.connect(bp);bp.connect(g);g.connect(x.destination);s.start(t);}catch(e){}}
  function ambient(){
    try{const x=ac();const buf=x.createBuffer(2,x.sampleRate*4,x.sampleRate);
      for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;}
      const s=x.createBufferSource();s.buffer=buf;s.loop=true;
      const l1=x.createBiquadFilter();l1.type='lowpass';l1.frequency.value=70;
      const l2=x.createBiquadFilter();l2.type='lowpass';l2.frequency.value=45;
      const g=x.createGain();g.gain.value=.022;
      s.connect(l1);l1.connect(l2);l2.connect(g);g.connect(x.destination);s.start();}catch(e){}}
  function sched(){const x=ac();
    while(hbSched<x.currentTime+.22){hb(hbSched);const delay=Math.max(0,(hbSched-x.currentTime)*1000);setTimeout(()=>{lastBeatJS=Date.now();cbs.forEach(fn=>{try{fn();}catch(e){}});},delay);hbInt=1.03+Math.random()*.19;hbSched+=hbInt;}
    while(nextTick<x.currentTime+.22){tick(nextTick);const td=Math.max(0,(nextTick-x.currentTime)*1000);setTimeout(()=>{tickCbs.forEach(fn=>{try{fn();}catch(e){}});},td);nextTick+=1.0;}}
  function rampDuck(){const d=duckTgt-duckCur;if(Math.abs(d)<.002){duckCur=duckTgt;duckRaf=null;return;}duckCur+=d*.04*3.5;duckRaf=requestAnimationFrame(rampDuck);}
  function setDuck(t){duckTgt=Math.max(.05,Math.min(1,t));if(!duckRaf)duckRaf=requestAnimationFrame(rampDuck);}
  function pulseLoop(){const s=(Date.now()-lastBeatJS)/1000;const lub=Math.max(0,1-s*11);const dub=s>.16?Math.max(0,1-(s-.20)*13)*.7:0;_vp=Math.max(lub,dub);requestAnimationFrame(pulseLoop);}
  return{
    start(){if(started){const x=ac();if(x.state==='suspended')x.resume();return;}started=true;mix();const x=ac();hbSched=x.currentTime+.35;nextTick=x.currentTime+.50;ambient();sched();setInterval(sched,110);if(!rafOn){rafOn=true;requestAnimationFrame(pulseLoop);}},
    setStage(s){stage=Math.max(1,Math.min(10,Math.round(s)));mix();},
    duck(t=.18){setDuck(t);},restore(){setDuck(1);},
    onBeat(fn){if(typeof fn==='function')cbs.push(fn);},
    onTick(fn){if(typeof fn==='function')tickCbs.push(fn);},
    get vPulse(){return _vp;},get stage(){return stage;}
  };
})();
const Scene=(()=>{
  let cv,ctx,W,H,HZ,t0=null;
  let stars=[],rT=[],lT=[],rTx=[],lLn=[],fgB={l1:[],l2:[],r1:[],r2:[]},tufts=[];
  let MTN={};
  const C={sk0:'#020610',sk1:'#060e18',sk2:'#0a1420',gd0:'#0a1008',gd1:'#050704',hg:'rgba(28,52,22,.20)',mf:'#111e11',mn:'#192b19',ft:'#223022',ftd:'#1a261a',fb:'rgba(42,62,36,.90)',fbd:'rgba(32,48,28,.78)',mnl:'rgba(30,50,26,.88)',mfm:'rgba(20,34,18,.88)',tr:'#182018',trd:'#121a12',gr:'#1c2812',grh:'#243014'};
  function bz(t,p0,p1,p2,p3){const u=1-t;return u*u*u*p0+3*u*u*t*p1+3*u*t*t*p2+t*t*t*p3;}
  function mY(px,py,bl,br,x,hz){const il=x<=px;let x0,x1,x2,x3,y0,y1,y2,y3;if(il){x0=bl;y0=hz;const mL=bl+(px-bl)*.42;x1=mL;y1=hz-(hz-py)*.65;x2=mL+(px-mL)*.6;y2=py+6;x3=px;y3=py;}else{x0=px;y0=py;const mR=px+(br-px)*.58;x1=mR;y1=py+6;x2=mR+(br-mR)*.4;y2=hz-(hz-py)*.65;x3=br;y3=hz;}let lo=0,hi=1;for(let i=0;i<18;i++){const m=(lo+hi)*.5;bz(m,x0,x1,x2,x3)<x?lo=m:hi=m;}return bz((lo+hi)*.5,y0,y1,y2,y3);}
  function build(w,h,hz){
    MTN={r:{px:w*.76,py:h*.30,bl:w*.42,br:w*1.04},l:{px:w*.26,py:h*.24,bl:w*-.06,br:w*.58}};
    stars=[];for(let i=0;i<Math.floor(w*h/1900);i++)stars.push({x:Math.random()*w,y:Math.random()*hz*.9,r:Math.random()*.85+.18,b:Math.random()*.24+.04,p:Math.random()*Math.PI*2,s:.22+Math.random()*.42});
    rT=[];const rm=MTN.r;for(let i=0;i<200;i++){const tx=rm.bl+Math.random()*(rm.br-rm.bl);if(tx>w*1.01)continue;const sy=mY(rm.px,rm.py,rm.bl,rm.br,tx,hz);if(sy>=hz-h*.004)continue;rT.push({x:tx,y:sy,h:h*(.016+Math.random()*.016),w:h*(.005+Math.random()*.006)});}
    rTx=[];for(let i=0;i<260;i++){const tx=rm.bl+Math.random()*(rm.br-rm.bl);if(tx>w*1.01)continue;const sy=mY(rm.px,rm.py,rm.bl,rm.br,tx,hz);const ty=sy+Math.random()*(hz-sy)*.8;if(ty>=hz)continue;rTx.push({tx,ty,dot:Math.random()<.5,len:Math.random()*3.2+1.2,ang:(Math.random()-.5)*.9,a:.15+Math.random()*.19});}
    lT=[];const lm=MTN.l;for(let i=0;i<180;i++){const tx=lm.bl+Math.random()*(lm.br-lm.bl);const sy=mY(lm.px,lm.py,lm.bl,lm.br,tx,hz);if(sy>=hz-h*.004)continue;lT.push({x:tx,y:sy,h:h*(.022+Math.random()*.020),w:h*(.007+Math.random()*.008)});}
    lLn=[];for(let i=0;i<180;i++){const tx=lm.bl+Math.random()*(lm.br-lm.bl);const sy=mY(lm.px,lm.py,lm.bl,lm.br,tx,hz);const ty=sy+Math.random()*(hz-sy)*.85;if(ty>=hz)continue;lLn.push({tx,ty,len:h*(.016+Math.random()*.024),ang:-Math.PI*.30+(Math.random()-.5)*.45,a:.18+Math.random()*.26});}
    function mkB(cx,height,spread){const L=[];for(let t=0;t<4;t++){const fr=t/4,tT=hz-height*(.95-fr*.76),tB=hz-height*(.60-fr*.74)+height*.08,mid=(tT+tB)/2,tW=spread*(.28+fr*.72+.04),cnt=5+Math.floor(fr*9);for(let b=0;b<cnt;b++){const bf=b/cnt;L.push({x:cx-tW*.44+bf*tW*.88+(Math.random()-.5)*tW*.10,y:mid+(Math.random()-.5)*(tB-tT)*.72,len:h*(.011+Math.random()*.016),ang:-Math.PI*.20+(Math.random()-.5)*.5,a:.24+Math.random()*.32});}}return L;}
    fgB.l1=mkB(w*.09,h*.68,w*.130);fgB.l2=mkB(w*.20,h*.56,w*.118);fgB.r1=mkB(w*.83,h*.45,w*.086);fgB.r2=mkB(w*.93,h*.52,w*.098);
    tufts=[];for(let i=0;i<38;i++)tufts.push({x:w*(.12+Math.random()*.76),y:hz+h*(.06+Math.random()*.18),h:h*(.008+Math.random()*.009),sw:(Math.random()-.5)*.26,p:Math.random()*Math.PI*2});}
  function fillM(m,col,hz){const{px,py,bl,br}=m;ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(bl,hz);const mL=bl+(px-bl)*.42,mR=px+(br-px)*.58;ctx.bezierCurveTo(mL,hz-(hz-py)*.65,mL+(px-mL)*.6,py+6,px,py);ctx.bezierCurveTo(mR,py+6,mR+(br-mR)*.4,hz-(hz-py)*.65,br,hz);ctx.lineTo(br,hz);ctx.lineTo(bl,hz);ctx.closePath();ctx.fill();}
  function hTree(x,y,th,tw,col){ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x,y-th);ctx.lineTo(x+tw*.36,y-th*.36);ctx.lineTo(x-tw*.36,y-th*.36);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(x,y-th*.58);ctx.lineTo(x+tw*.50,y);ctx.lineTo(x-tw*.50,y);ctx.closePath();ctx.fill();}
  function fgTree(cx,ht,sp,col,tCol){const by=HZ-3;for(let t=0;t<4;t++){const f=t/4,tT=by-ht*(.95-f*.76),tB=by-ht*(.60-f*.74)+ht*.08,tW=sp*(.28+f*.72+.04);ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(cx,tT);ctx.lineTo(cx+tW/2,tB);ctx.lineTo(cx-tW/2,tB);ctx.closePath();ctx.fill();}const tw=Math.max(4,sp*.08),tTop=by-ht*.11;ctx.fillStyle=tCol;ctx.fillRect(cx-tw/2,tTop,tw,(HZ+4)-tTop);}
  function brLines(marks,col){ctx.save();ctx.strokeStyle=col;ctx.lineCap='round';ctx.lineWidth=1.3;marks.forEach(m=>{ctx.globalAlpha=m.a;ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(m.x+Math.cos(m.ang)*m.len,m.y+Math.sin(m.ang)*m.len);ctx.stroke();});ctx.restore();}
  function stream(t){const sx=W*.03,sy=H*.80,ex=W*.26,ey=HZ+H*.018,c1x=W*.07,c1y=H*.84,c2x=W*.16,c2y=H*.72;ctx.save();const sg=ctx.createLinearGradient(sx,sy,ex,ey);sg.addColorStop(0,'rgba(8,18,30,0)');sg.addColorStop(.3,'rgba(14,30,48,.48)');sg.addColorStop(.72,'rgba(16,32,52,.38)');sg.addColorStop(1,'rgba(10,20,36,0)');ctx.strokeStyle=sg;ctx.lineWidth=W*.022;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(sx,sy);ctx.bezierCurveTo(c1x,c1y,c2x,c2y,ex,ey);ctx.stroke();const shi=(Math.sin(t*1.3)*.5+.5)*.09+.04;ctx.strokeStyle='rgba(50,100,140,'+shi+')';ctx.lineWidth=W*.005;ctx.beginPath();ctx.moveTo(sx+W*.01,sy+H*.004);ctx.bezierCurveTo(c1x+W*.01,c1y,c2x,c2y,ex,ey);ctx.stroke();ctx.restore();}
  function stageEl(w,h){const sw=Math.min(w*.26,210),sh=h*.016,sx=w*.5-sw/2,sy=h-h*.034-sh;ctx.save();ctx.fillStyle=C.trd;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(sx,sy,sw,sh,2);else ctx.rect(sx,sy,sw,sh);ctx.fill();ctx.fillStyle='rgba(80,70,48,.13)';ctx.fillRect(sx+2,sy,sw-4,1.5);ctx.restore();}
  return{
    init(canvas){cv=canvas;ctx=cv.getContext('2d');},
    resize(w,h){W=w;H=h;const asp=W/H,tt=Math.max(0,Math.min(1,(asp-.6)/.8));HZ=H*(.70+tt*.04);const dp=window.devicePixelRatio||1;cv.width=Math.round(W*dp);cv.height=Math.round(H*dp);cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(1,0,0,1,0,0);ctx.scale(dp,dp);build(W,H,HZ);},
    draw(ts){if(!t0)t0=ts;const t=(ts-t0)/1000;ctx.clearRect(0,0,W,H);
      const sky=ctx.createLinearGradient(0,0,0,HZ);sky.addColorStop(0,C.sk0);sky.addColorStop(.55,C.sk1);sky.addColorStop(1,C.sk2);ctx.fillStyle=sky;ctx.fillRect(0,0,W,HZ+H*.05);
      const gnd=ctx.createLinearGradient(0,HZ,0,H);gnd.addColorStop(0,C.gd0);gnd.addColorStop(.55,'#070d05');gnd.addColorStop(1,C.gd1);ctx.fillStyle=gnd;ctx.fillRect(0,HZ,W,H-HZ);

/* ── Tier IV ── */
function setupT4(){t4cv=document.getElementById('t4-cv');t4ctx=t4cv.getContext('2d');}
function resizeT4(){dpr=window.devicePixelRatio||1;t4W=window.innerWidth;t4H=window.innerHeight-NAV_H;t4cv.width=Math.round(t4W*dpr);t4cv.height=Math.round(t4H*dpr);t4cv.style.width=t4W+'px';t4cv.style.height=t4H+'px';t4ctx.setTransform(1,0,0,1,0,0);t4ctx.scale(dpr,dpr);}
function spawnT4Clock(tx,ty,randomTime){
  const style=T4_STYLES[Math.floor(Math.random()*6)];
  let h,m,s;
  if(randomTime){h=Math.floor(Math.random()*24);m=Math.floor(Math.random()*60);s=Math.floor(Math.random()*60);}
  else{const d=new Date();h=d.getHours();m=d.getMinutes();s=d.getSeconds();}
  const sz=Math.min(Math.min(t4W,t4H)*.085,52)+Math.random()*Math.min(t4W,t4H)*.04;
  tx=Math.max(sz*1.5,Math.min(t4W-sz*1.5,tx));
  ty=Math.max(sz*1.8,Math.min(t4H-sz*2.0,ty));
  t4Clocks.push({style,totalSec:h*3600+m*60+s,x:tx,y:ty,r:sz,state:'frozen'});
}
function updateT4Clocks(dt){
  for(const clk of t4Clocks){
    if(clk.state==='forward')clk.totalSec=(clk.totalSec+dt*30+86400)%86400;
    else if(clk.state==='backward')clk.totalSec=((clk.totalSec-dt*30)%86400+86400)%86400;
  }
}
function tapT4Clock(x,y){
  for(let i=t4Clocks.length-1;i>=0;i--){
    const clk=t4Clocks[i];
    if(Math.hypot(x-clk.x,y-clk.y)<=clk.r){
      const states=['frozen','forward','backward'];
      clk.state=states[(states.indexOf(clk.state)+1)%3];
      playBtnClick();return true;
    }
  }
  return false;
}
function drawT4Frame(dt){
  if(currentTier!==4&&!ssActive)return;
  updateT4Clocks(dt);
  t4ctx.clearRect(0,0,t4W,t4H);
  for(const clk of t4Clocks){
    const ts=Math.floor(Math.abs(clk.totalSec))%86400;
    const h=Math.floor(ts/3600),m=Math.floor((ts%3600)/60),s=Math.floor(ts%60);
    t4ctx.save();
    drawClockByStyle(t4ctx,clk.x,clk.y,clk.r,clk.style,h,m,s);
    const lbl=clk.state==='forward'?'\u25BA FORWARD':clk.state==='backward'?'\u25C4 BACKWARD':'FROZEN';
    const lblCol=clk.state==='forward'?'rgba(255,180,50,.80)':clk.state==='backward'?'rgba(100,180,255,.80)':'rgba(255,255,255,.36)';
    t4ctx.fillStyle=lblCol;t4ctx.font=Math.max(7,clk.r*.135)+"px 'Courier New',monospace";t4ctx.textAlign='center';t4ctx.textBaseline='top';
    t4ctx.fillText(lbl,clk.x,clk.y+clk.r+Math.max(4,clk.r*.12));
    t4ctx.restore();
  }
}

/* ── navigation ── */
function switchTier(n){currentTier=n;document.querySelectorAll('.tier').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));document.getElementById('t'+n).classList.add('on');document.querySelector('[data-tier="'+n+'"]').classList.add('active');if(n===2)resizeT2();}

/* ── screensaver ── */
function resetIdle(){clearTimeout(idleTimer);idleTimer=setTimeout(startSS,IDLE_MS);}
function startSS(){if(ssActive)return;ssActive=true;savedTier=currentTier;document.getElementById('t4-ui').style.visibility='hidden';t4Clocks=[];switchTier(4);spawnT4Clock(t4W*(0.20+Math.random()*.60),t4H*(0.25+Math.random()*.55),true);}
function stopSS(){ssActive=false;t4Clocks=[];document.getElementById('t4-ui').style.visibility='visible';if(savedTier===2)openTier2(t2Idx);else switchTier(savedTier);}

/* ── first interaction + cold open ── */
function onFirstInt(){
  if(_firstInt)return;_firstInt=true;
  PulseTock.start();PulseTock.setStage(10);startAmbient();
  PulseTock.onTick(()=>{tickCount++;redrawAllTiles();});
  PulseTock.onBeat(()=>{if(ssActive&&t4Clocks.length<5)spawnT4Clock(t4W*(0.12+Math.random()*.76),t4H*(0.22+Math.random()*.60),true);});
  resetIdle();
}
function doColdOpen(){
  setTimeout(()=>document.getElementById('bg').classList.add('on'),80);
  setTimeout(()=>{document.getElementById('nav').classList.add('on');document.getElementById('t1-subtitle').classList.add('on');},1900);
  setTimeout(()=>{tileEls.forEach((t,i)=>setTimeout(()=>t.el.classList.add('on'),i*55));coldDone=true;},2200);
}

/* ── main loop ── */
function mainLoop(ts){
  const now=Date.now();
  const dt=lastFrameMs?Math.min((now-lastFrameMs)/1000,.08):0;
  lastFrameMs=now;
  Scene.draw(ts);
  if(currentTier===2)drawT2Frame();
  if(currentTier===4||ssActive)drawT4Frame(dt);
  requestAnimationFrame(mainLoop);
}

/* ── resize ── */
function resize(){
  dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;
  Scene.resize(W,H);
  const COLS=3,GAP=8,LABEL_H=14,ASPECT=0.62,rows=4;
  const availW=W-20,availH=H-NAV_H-36;
  const maxByW=Math.floor((availW-GAP*(COLS-1))/COLS);
  const maxByH=Math.floor((availH-GAP*(rows-1)-LABEL_H*rows)/rows/ASPECT);
  tileW=Math.min(Math.max(Math.min(maxByW,maxByH),68),152);tileH=Math.floor(tileW*ASPECT);
  setupTiles();if(currentTier===2)resizeT2();resizeT4();
}

/* ── init ── */
Scene.init(document.getElementById('bg'));
setupT4();setupT2();
window.addEventListener('resize',resize);
resize();

/* ── events ── */
document.querySelectorAll('.tbtn').forEach(btn=>{
  btn.addEventListener('pointerdown',e=>{e.preventDefault();onFirstInt();resetIdle();const n=parseInt(btn.dataset.tier);if(n===2)openTier2(t2Idx);else switchTier(n);});
});
document.getElementById('t2-prev').addEventListener('pointerdown',e=>{e.stopPropagation();onFirstInt();resetIdle();t2Idx=(t2Idx-1+12)%12;openTier2(t2Idx);});
document.getElementById('t2-next').addEventListener('pointerdown',e=>{e.stopPropagation();onFirstInt();resetIdle();t2Idx=(t2Idx+1)%12;openTier2(t2Idx);});
document.getElementById('t2-hours').addEventListener('pointerdown',e=>{e.stopPropagation();onFirstInt();t2Hours=(t2Hours+1)%24;updateT2Display();checkReward();resetT2Idle();resetIdle();playBtnClick();});
document.getElementById('t2-minutes').addEventListener('pointerdown',e=>{e.stopPropagation();onFirstInt();t2Minutes=(t2Minutes+1)%60;updateT2Display();checkReward();resetT2Idle();resetIdle();playBtnClick();});
document.getElementById('t4-cv').addEventListener('pointerdown',e=>{
  if(ssActive){stopSS();return;}
  onFirstInt();resetIdle();
  const rect=t4cv.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  if(!tapT4Clock(x,y))spawnT4Clock(x,y,true);
});
document.getElementById('t4-clear').addEventListener('pointerdown',e=>{e.stopPropagation();t4Clocks=[];});
document.addEventListener('pointerdown',()=>{if(!_firstInt)return;if(ssActive)stopSS();else resetIdle();});

doColdOpen();
requestAnimationFrame(mainLoop);
</script>
</body>
</html>
